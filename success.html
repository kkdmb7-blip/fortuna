<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포르투나 — 결제 완료</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{--void:#06030f;--gold:#c9a84c;--text:#e8e0f0;--text-dim:#9b8fb0;--border:rgba(201,168,76,0.25);--font-display:'Cormorant Garamond',Georgia,serif;--font-serif:'DM Serif Display',Georgia,serif;--font-sans:'Pretendard',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:var(--o,0.4);}
  @keyframes twinkle{0%,100%{opacity:var(--o,0.4);transform:scale(1)}50%{opacity:calc(var(--o,0.4)*0.3);transform:scale(0.7)}}
  .nebula{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(45,31,78,0.6) 0%,transparent 70%),radial-gradient(ellipse 80% 50% at 50% 50%,rgba(10,6,18,0.9) 0%,transparent 100%);}
  .container{position:relative;z-index:1;max-width:560px;width:100%;margin:0 auto;padding:40px 24px;text-align:center;}
  .success-icon{font-size:56px;margin-bottom:24px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .badge{display:inline-block;font-size:10px;letter-spacing:0.4em;color:var(--gold);border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:5px 16px;margin-bottom:20px;text-transform:uppercase;}
  .title{font-family:var(--font-display);font-size:28px;font-weight:300;letter-spacing:0.04em;margin-bottom:12px;color:var(--gold);}
  .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto;}
  .subtitle{font-family:var(--font-sans);font-size:13px;color:var(--text-dim);line-height:2.2;letter-spacing:0.03em;}
  .info-box{background:linear-gradient(135deg,rgba(36,22,63,0.3),rgba(7,3,18,0.6));border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:20px 24px;margin:28px auto;max-width:380px;text-align:left;}
  .info-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-dim);line-height:1.8;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .info-row:last-child{border-bottom:none;}
  .info-icon{color:var(--gold);font-size:14px;margin-top:2px;flex-shrink:0;}
  .home-btn{display:inline-block;margin-top:32px;font-size:13px;color:var(--text-dim);letter-spacing:0.06em;text-decoration:none;border:1px solid rgba(201,168,76,0.15);border-radius:30px;padding:10px 24px;transition:all .3s;}
  .home-btn:hover{border-color:rgba(201,168,76,0.35);color:var(--gold);}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:50vh;}
  .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:var(--font-display);font-size:14px;color:var(--text-dim);letter-spacing:0.1em;}
  .error-screen{text-align:center;padding:40px 20px;}
  .error-title{font-family:var(--font-display);font-size:24px;color:#ff6b6b;margin-bottom:12px;}
  .error-text{font-family:var(--font-sans);font-size:13px;color:var(--text-dim);line-height:2;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MAKE_LIGHT='https://hook.us2.make.com/b62293azhh6ivviyvbakvmoqulpw5756';
const MAKE_PREMIUM='https://hook.us2.make.com/eayso51sps46i7ig1dlyt3t1yw6q1tqu';
const MAKE_SAJU_PREMIUM='https://hook.us2.make.com/9wo35lf465ek74mlgifaank1wdvs9mnh';
const SAJU_API_KEY='able_test_oQYNyh3DBwThnyKvXwzXOVVnc15cav7hRni9DsfP21o';
</script>
</head>
<body>
<div class="nebula"></div>
<div class="stars" id="stars"></div>

<div class="container" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">결제 확인 중...</div>
  </div>
</div>

<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.6};animation-delay:${Math.random()*4}s;`;starsEl.appendChild(s);}

function calcDominant(planets){
  const scores={};const INNER=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  INNER.forEach(p=>{scores[p]=0;});
  const asc=planets.find(p=>p.name==='Ascendant');const sun=planets.find(p=>p.name==='Sun');const moon=planets.find(p=>p.name==='Moon');
  planets.forEach(p=>{if(!INNER.includes(p.name))return;if(p.house===1)scores[p.name]+=5;if(p.house===10)scores[p.name]+=4;if(p.isRetro==='true')scores[p.name]-=1;});
  [sun,moon,asc].filter(Boolean).forEach(a=>{planets.forEach(p=>{if(!INNER.includes(p.name)||a.name===p.name)return;const diff=Math.abs(p.fullDegree-a.fullDegree);const angle=diff>180?360-diff:diff;if(angle<=8)scores[p.name]+=3;});});
  let dominant='Sun';let maxScore=-999;INNER.forEach(p=>{if(scores[p]>maxScore){maxScore=scores[p];dominant=p;}});return dominant;
}
function calcAspects(planets){
  const ASPECTS=[{name:'합',angle:0,orb:8},{name:'대립',angle:180,orb:8},{name:'삼각',angle:120,orb:8},{name:'사각',angle:90,orb:6},{name:'육각',angle:60,orb:6}];
  const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const results=[];
  for(let i=0;i<PLANETS.length;i++){for(let j=i+1;j<PLANETS.length;j++){const p1=planets.find(p=>p.name===PLANETS[i]);const p2=planets.find(p=>p.name===PLANETS[j]);if(!p1||!p2)continue;const diff=Math.abs(p1.fullDegree-p2.fullDegree);const angle=diff>180?360-diff:diff;ASPECTS.forEach(asp=>{if(Math.abs(angle-asp.angle)<=asp.orb)results.push(`${PLANETS[i]}-${PLANETS[j]} ${asp.name}(${angle.toFixed(1)}°)`);});}}
  return results.join(', ');
}
function updateLoadingText(msg){
  const el=document.querySelector('.loading-text');
  if(el)el.textContent=msg;
}

function showSuccess(order, reportType){
  const isSaju=reportType==='saju_premium';
  const isLight=reportType==='light';
  const icon=isSaju?'☯':isLight?'🌙':'☀️';
  const deliveryTime=isSaju?'48시간 내':isLight?'24시간 내':'48시간 내';
  document.getElementById('app').innerHTML=`
    <div class="success-icon">${icon}</div>
    <div class="badge">Payment Complete</div>
    <div class="title">결제가 완료되었습니다<br><em style="font-style:italic;">✦ 감사합니다 ✦</em></div>
    <div class="divider"></div>
    <p class="subtitle">AI가 찍어내는 결과가 아닌,<br>당신만을 위해 정성스럽게 제작되는<br>개인 맞춤형 리포트이기에 시간이 소요됩니다</p>
    <div class="info-box">
      <div class="info-row"><span class="info-icon">✦</span><span>결제가 확인되어 제작을 시작합니다</span></div>
      <div class="info-row"><span class="info-icon">📧</span><span>${deliveryTime} <strong style="color:var(--gold)">${order.email||'입력하신 이메일'}</strong>로 PDF 리포트를 발송해드립니다</span></div>
      <div class="info-row"><span class="info-icon">🔍</span><span>스팸함도 꼭 확인해주세요</span></div>
      ${isSaju?`<div class="info-row"><span class="info-icon">☯</span><span>사주+점성 통합 분석으로 더욱 깊이 있는 리포트를 준비합니다</span></div>`:''}
    </div>
    <a href="index.html" class="home-btn">← 메인으로 돌아가기</a>
  `;
}

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="error-screen">
      <div class="error-title">⚠️ 오류가 발생했습니다</div>
      <div class="error-text">${msg}<br><br>문제가 지속되면 <a href="mailto:kkdmb@naver.com" style="color:var(--gold)">kkdmb@naver.com</a>으로 연락해주세요.</div>
      <a href="javascript:history.back()" class="home-btn" style="margin-top:24px;">← 돌아가기</a>
    </div>
  `;
}

async function processPayment(){
  const params=new URLSearchParams(location.search);
  const paymentKey=params.get('paymentKey');
  const orderId=params.get('orderId');
  const amount=params.get('amount');
  const reportType=params.get('type')||'light';

  if(!paymentKey||!orderId){showError('결제 정보를 찾을 수 없습니다.');return;}

  let order={};
  try{const stored=sessionStorage.getItem('pendingOrder');if(stored)order=JSON.parse(stored);}catch(e){}

  try{
    // 1. Supabase 저장
    const dbData={
      order_id:order.order_id||orderId,
      name:order.name||'',email:order.email||'',gender:order.gender||'',
      birthdate_raw:order.birthdate_raw||'',calendar:order.calendar||'양력',
      year:order.year||0,month:order.month||0,day:order.day||0,
      hour:order.hour||0,min:order.min||0,
      birthplace:order.birthplace||'',place_en:order.place_en||'',
      lat:order.lat||0,lon:order.lon||0,tzone:9.0,
      report_type:reportType,status:'paid',
      payment_key:paymentKey,payment_amount:parseInt(amount)||0
    };
    await sb.from('orders').insert([dbData]).then(({error})=>{if(error)console.error('DB오류:',error);});

    if(order.year&&order.lat){

      // 2. 점성 API 호출 (공통)
      updateLoadingText('별자리 데이터 계산 중...');
      let planets=[];let dominant='Sun';let aspects='';
      try{
        const astroRes=await fetch('https://json.astrologyapi.com/v1/planets/tropical',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json','Authorization':'Basic '+btoa('650365:2f0f8ed601443fd86eb24b9e503b4cabd3aec6b8')},
          body:JSON.stringify({day:order.day,month:order.month,year:order.year,hour:order.hour,min:order.min,lat:order.lat,lon:order.lon,tzone:9.0})
        });
        const astroData=await astroRes.json();
        planets=astroData.output||astroData;
        dominant=calcDominant(planets);
        aspects=calcAspects(planets);
      }catch(e){console.error('점성 API 오류:',e);}

      if(reportType==='saju_premium'){
        // 3a. 사주 API 추가 호출
        updateLoadingText('사주 데이터 계산 중...');
        let sajuData={};
        try{
          const sajuBirth=order.saju_birth||(
            `${order.year}-${String(order.month).padStart(2,'0')}-${String(order.day).padStart(2,'0')}T${String(order.hour).padStart(2,'0')}:${String(order.min).padStart(2,'0')}:00`
          );
          const sajuGender=order.saju_gender||(order.gender==='남성'?'male':'female');
          const sajuCity=order.saju_city||'서울특별시';
          const sajuRes=await fetch(
            `https://api.ablecity.kr/api/v1/saju/fortune?birth=${encodeURIComponent(sajuBirth)}&gender=${sajuGender}&city=${encodeURIComponent(sajuCity)}&calendar=solar`,
            {headers:{'Authorization':`Bearer ${SAJU_API_KEY}`,'Accept':'application/json'}}
          );
          const sajuJson=await sajuRes.json();
          if(sajuJson.status==='success'){sajuData=sajuJson.data;}
          else{console.error('사주 API 오류:',sajuJson);}
        }catch(e){console.error('사주 API 호출 오류:',e);}

        // 4a. 통합 웹훅 전송
        updateLoadingText('리포트 제작을 시작합니다...');
        await fetch(MAKE_SAJU_PREMIUM,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            request_id:dbData.order_id,
            client_name:order.name,
            recipient_email:order.email,
            birth_info_raw:`${order.birthdate_raw} (${order.calendar}) ${order.hour}시 ${order.min}분 ${order.birthplace}`,
            birth_place_text:order.birthplace,
            place:order.place_en,
            year:order.year,month:order.month,day:order.day,
            hour:order.hour,min:order.min,lat:order.lat,lon:order.lon,tzone:9.0,
            report_type:'saju_premium',
            doc_name:`포르투나_${order.name}`,
            // 점성 데이터
            dominant_planet:dominant,
            aspects_summary:aspects,
            planets_json:JSON.stringify(planets),
            // 사주 핵심 데이터 (Make에서 변수로 쓸 수 있게 분리)
            saju_pillars:sajuData.summary?.pillars||'',
            saju_strength:sajuData.summary?.strength||'',
            saju_zodiac:sajuData.summary?.zodiac||'',
            saju_yongshin_primary:sajuData.yongshin?.primary_kor||'',
            saju_yongshin_secondary:sajuData.yongshin?.secondary_kor||'',
            saju_five_pct:JSON.stringify(sajuData.five_pct||{}),
            saju_geokguk:JSON.stringify(sajuData.geokguk||{}),
            saju_big_luck:JSON.stringify((sajuData.big_luck||[]).slice(0,5)),
            saju_data_full:JSON.stringify(sajuData),
            payment_key:paymentKey,
            status:'paid'
          })
        });

      } else {
        // 3b. 기존 라이트/프리미엄 웹훅
        updateLoadingText('리포트 제작을 시작합니다...');
        const webhookUrl=reportType==='premium'?MAKE_PREMIUM:MAKE_LIGHT;
        await fetch(webhookUrl,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            request_id:dbData.order_id,
            client_name:order.name,
            recipient_email:order.email,
            birth_info_raw:`${order.birthdate_raw} (${order.calendar}) ${order.hour}시 ${order.min}분 ${order.birthplace}`,
            birth_place_text:order.birthplace,
            place:order.place_en,
            year:order.year,month:order.month,day:order.day,
            hour:order.hour,min:order.min,lat:order.lat,lon:order.lon,tzone:9.0,
            report_type:reportType,
            doc_name:`포르투나_${order.name}`,
            dominant_planet:dominant,
            aspects_summary:aspects,
            planets_json:JSON.stringify(planets),
            payment_key:paymentKey,
            status:'paid'
          })
        });
      }
    }

    sessionStorage.removeItem('pendingOrder');
    showSuccess(order, reportType);

  }catch(err){
    console.error('결제 처리 오류:',err);
    showError('결제 처리 중 오류가 발생했습니다. 결제는 완료되었을 수 있으니 이메일로 문의해주세요.');
  }
}

processPayment();
</script>
</body>
</html>
