async function callMakeHook(url, payload, orderId, reportType){
  try{
    const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    if(r.ok) return { ok:true };
    // 2xx 외 응답 — 웹훅 죽었거나 시나리오 비활성화
    console.warn('[Make webhook] non-OK:', r.status);
    await reportMakeFailure(orderId, reportType, payload, `HTTP ${r.status}`);
    return { ok:false, error:`HTTP ${r.status}` };
  }catch(e){
    console.error('[Make webhook] error:', e);
    await reportMakeFailure(orderId, reportType, payload, e.message || String(e));
    return { ok:false, error:e.message };
  }
}

async function reportMakeFailure(orderId, reportType, payload, errorMsg){
  // 1) DB 에 make_failed 플래그 (mypage 에서 보임)
  try{
    await sb.from('orders').update({ status: 'paid_make_failed' }).eq('order_id', orderId);

  try{

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        type:'error',
        user_name: payload.client_name || '주문자',

        message: `주문 ${orderId} | ${payload.recipient_email || '이메일'} | ${errorMsg} | 수동 처리 필요`
      })
    }).catch(()=>{});
  }catch(e){}
}

<script>


function calcDominant(planets){
  const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const SN=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const SR={'Aries':'Mars','Taurus':'Venus','Gemini':'Mercury','Cancer':'Moon','Leo':'Sun','Virgo':'Mercury','Libra':'Venus','Scorpio':'Pluto','Sagittarius':'Jupiter','Capricorn':'Saturn','Aquarius':'Uranus','Pisces':'Neptune'};
  const BW={Sun:2,Moon:2,Mercury:1.5,Venus:1.5,Mars:2,Jupiter:1,Saturn:0.8,Uranus:0.5,Neptune:0.5,Pluto:0.5};
  const HS={1:6,10:5,7:4,4:5,2:2,5:2,8:2,11:2,3:1,6:1,9:1,12:1};
  const sc={};PLANETS.forEach(p=>{sc[p]=0;});
  planets.forEach(p=>{if(!PLANETS.includes(p.name))return;sc[p.name]+=(HS[p.house]||0)*(BW[p.name]||1);if(p.isRetro==='true')sc[p.name]-=1;});
  planets.forEach(p=>{if(!PLANETS.includes(p.name))return;if(SR[SN[Math.floor(p.fullDegree/30)]]===p.name)sc[p.name]+=6*(BW[p.name]||1);});
  planets.forEach(p=>{if(!PLANETS.includes(p.name))return;Object.entries(SR).filter(([s,r])=>r===p.name).forEach(([s])=>{planets.forEach(o=>{if(PLANETS.includes(o.name)&&SN[Math.floor(o.fullDegree/30)]===s)sc[p.name]+=2*(BW[o.name]||1);});});});
  const asc=planets.find(p=>p.name==='Ascendant');if(asc){const r=SR[SN[Math.floor(asc.fullDegree/30)]];if(r&&sc[r]!==undefined)sc[r]+=3;}
  planets.filter(p=>['Sun','Moon','Ascendant'].includes(p.name)).forEach(key=>{planets.forEach(p=>{if(!PLANETS.includes(p.name)||key.name===p.name)return;const diff=Math.abs(p.fullDegree-key.fullDegree);const angle=diff>180?360-diff:diff;for(const a of [{a:0,orb:8,w:3},{a:120,orb:8,w:2.5},{a:60,orb:6,w:2},{a:180,orb:8,w:2},{a:90,orb:6,w:1.5}]){if(Math.abs(angle-a.a)<=a.orb){sc[p.name]+=a.w*(BW[p.name]||1);break;}}});});
  let dominant='Sun',max=-999;PLANETS.forEach(p=>{if(sc[p]>max){max=sc[p];dominant=p;}});return dominant;
}

function calcAspects(planets){
  const ASPECTS=[{name:'합',angle:0,orb:8},{name:'대립',angle:180,orb:8},{name:'삼각',angle:120,orb:8},{name:'사각',angle:90,orb:6},{name:'육각',angle:60,orb:6}];
  const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const results=[];
  for(let i=0;i<PLANETS.length;i++){
    for(let j=i+1;j<PLANETS.length;j++){
      const p1=planets.find(p=>p.name===PLANETS[i]);
      const p2=planets.find(p=>p.name===PLANETS[j]);
      if(!p1||!p2)continue;
      const diff=Math.abs(p1.fullDegree-p2.fullDegree);
      const angle=diff>180?360-diff:diff;
      ASPECTS.forEach(asp=>{
        if(Math.abs(angle-asp.angle)<=asp.orb)
          results.push(`${PLANETS[i]}-${PLANETS[j]} ${asp.name}(${angle.toFixed(1)}°)`);
      });
    }
  }
  return results.join(', ');
}

}

      <a href="javascript:history.back()" class="home-btn" style="margin-top:24px;">← 돌아가기</a>

async function processPayment(){
  const params = new URLSearchParams(location.search);
  const reportType = params.get('type') || 'light';

  // ── 포트원/이니시스 공통: /api/payment/return 에서 검증 후 redirect ──
  // error 파라미터: 결제 실패 또는 취소
  const errorMsg = params.get('error');
  if (errorMsg) {
    showError(decodeURIComponent(errorMsg));
    return;
  }

  const resultCode  = params.get('resultCode');   // 0000 = 성공
  const resultMsg   = params.get('resultMsg');
  const orderId     = params.get('MOID') || params.get('orderId');
  const tid         = params.get('TID');
  const applDate    = params.get('applDate');

  // 토스 레거시 파라미터 (혹시 남아있을 경우 대비)
  const paymentKey  = params.get('paymentKey');

  // 토스 방식으로 들어온 경우 (기존 주문 처리)
  if(paymentKey && orderId && !resultCode){
    await processTossPayment(paymentKey, orderId, params.get('amount'), reportType);
    return;
  }

  // 결제 결과값 없으면 에러
  if(!resultCode || !orderId){
    showError('결제 정보를 찾을 수 없습니다.');
    return;
  }

  // 결제 실패
  if(resultCode !== '0000'){
    showError(`결제가 실패했습니다.<br>사유: ${resultMsg||'알 수 없음'}`);
    return;
  }

  // ── 이니시스 결제 성공 처리 ──
  let order = {};

  // 1) sessionStorage에서 pendingOrder 읽기
  try{
    const stored = sessionStorage.getItem('pendingOrder');
    if(stored) order = JSON.parse(stored);
  }catch(e){}

  // 2) orderId가 일치하지 않으면 무효화 (다른 주문 데이터일 수 있음)
  if(order.order_id && order.order_id !== orderId){
    console.warn('[success] pendingOrder orderId 불일치, 초기화');
    order = {};
  }

  // 3) email 없으면 Supabase에서 직접 조회 (이니시스 리다이렉트로 세션 날아간 경우)
  if(!order.email){
    console.log('[success] pendingOrder 없음, DB에서 조회 시도:', orderId);
    try{
      const {data} = await sb.from('orders').select('*').eq('order_id', orderId).single();
      if(data && data.email) order = data;
    }catch(e){}
  }

  // 4) 그래도 없으면 localStorage의 마지막 이메일로 복구 시도
  if(!order.email){
    try{
      const lastEmail = localStorage.getItem('fortuna_order_email');
      if(lastEmail) order.email = lastEmail;
    }catch(e){}
  }

  console.log('[success] 최종 order.email:', order.email, '/ order_id:', orderId);

  try{
    // 1. Supabase 저장/업데이트
    window._lastOrder = null;
    const dbData = {
      order_id:   order.order_id || orderId,
      name:       order.name || '',
      email:      order.email || '',
      gender:     order.gender || '',
      birthdate_raw: order.birthdate_raw || '',
      calendar:   order.calendar || '양력',
      year:       order.year || 0,
      month:      order.month || 0,
      day:        order.day || 0,
      hour:       order.hour || 0,
      min:        order.min || 0,
      birthplace: order.birthplace || '',
      place_en:   order.place_en || '',
      lat:        order.lat || 0,
      lon:        order.lon || 0,
      tzone:      9.0,
      report_type: reportType,
      status:     'paid',
      payment_key: tid || orderId,
      payment_amount: order.payment_amount || 0
    };

    // upsert: 이미 있으면 status만 업데이트
    await sb.from('orders').upsert([dbData], {onConflict:'order_id'});

    // 구독 저장
    try{
      const { data: authData } = await sb.auth.getSession();
      const userId = authData?.session?.user?.id || order.email || '';
      const premiumUntil = new Date(Date.now() + 30*24*60*60*1000).toISOString();
      await sb.from('subscriptions').upsert([{
        user_id:       userId,
        plan_type:     reportType,
        is_premium:    true,
        premium_until: premiumUntil,
        payment_id:    orderId,
        paid_at:       new Date().toISOString(),
        created_at:    Date.now()
      }], {onConflict:'payment_id'});
    }catch(e){ console.error('[subscriptions] 저장 실패:', e); }

    // 마이페이지 즉시 표시용 - 직전 주문 저장 (localStorage + sessionStorage 둘 다)
    try{
      window._lastOrder = {...dbData, created_at: new Date().toISOString()};
      const lastOrderJson = JSON.stringify(window._lastOrder);
      sessionStorage.setItem('fortuna_last_order', lastOrderJson);
      localStorage.setItem('fortuna_last_order', lastOrderJson); // fallback
      if(order.email && order.email.trim()) localStorage.setItem('fortuna_order_email', order.email.trim());
    }catch(e){ console.error('주문 저장 실패:', e); }

    if(order.year && order.lat){

      // 2. 점성 API 호출
      updateLoadingText('별자리 데이터 계산 중...');
      let planets=[], dominant='Sun', aspects='';
      try{
        const astroRes = await fetch('https://fortuna.kkdmb7.workers.dev/astro',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            day:order.day, month:order.month, year:order.year,
            hour:order.hour, min:order.min,
            lat:order.lat, lon:order.lon, tzone:9.0
          })
        });
        const astroData = await astroRes.json();
        planets = astroData.output || astroData;
        dominant = calcDominant(planets);
        aspects  = calcAspects(planets);
      }catch(e){ console.error('점성 API 오류:',e); }

      if(reportType === 'saju_premium'){
        // 3a. 사주 API
        updateLoadingText('사주 데이터 계산 중...');
        let sajuData = {};
        try{
          const sajuBirth = order.saju_birth || (
            `${order.year}-${String(order.month).padStart(2,'0')}-${String(order.day).padStart(2,'0')}T${String(order.hour).padStart(2,'0')}:${String(order.min).padStart(2,'0')}:00`
          );
          const sajuGender = order.saju_gender || (order.gender==='남성'?'male':'female');
          const sajuCity   = order.saju_city || '서울특별시';
          // Worker /saju-test 경유 (현재 활성 엔드포인트)
          const sajuRes = await fetch('https://fortuna.kkdmb7.workers.dev/saju-test', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              birth: sajuBirth,
              gender: sajuGender === 'male' ? 'M' : 'F',
              calendar: 'solar'
            })
          });
          sajuData = await sajuRes.json();
          console.log('[사주API 응답]', sajuData);
          if (sajuData.error) { console.error('사주 API 오류:', sajuData); sajuData = {}; }
        }catch(e){ console.error('사주 API 호출 오류:',e); }

        // 4a. 통합 웹훅 — callMakeHook 으로 안전하게 (실패 시 운영자 알림 + DB 플래그)
        updateLoadingText('리포트 제작을 시작합니다...');
        await callMakeHook(MAKE_SAJU_PREMIUM, {
          request_id:         dbData.order_id,
          client_name:        order.name,
          recipient_email:    order.email,
          birth_info_raw:     `${order.birthdate_raw} (${order.calendar}) ${order.hour}시 ${order.min}분 ${order.birthplace}`,
          birth_place_text:   order.birthplace,
          place:              order.place_en,
          year:order.year, month:order.month, day:order.day,
          hour:order.hour, min:order.min,
          lat:order.lat, lon:order.lon, tzone:9.0,
          report_type:        'saju_premium',
          doc_name:           `포르투나_${order.name}`,
          dominant_planet:    dominant,
          aspects_summary:    aspects,
          planets_json:       JSON.stringify(planets),
          saju_pillars:       sajuData.summary?.pillars||'',
          saju_strength:      sajuData.summary?.strength||'',
          saju_zodiac:        sajuData.summary?.zodiac||'',
          saju_yongshin_primary:   sajuData.yongshin?.primary_kor||'',
          saju_yongshin_secondary: sajuData.yongshin?.secondary_kor||'',
          saju_five_pct:      JSON.stringify(sajuData.five_pct||{}),
          saju_geokguk:       JSON.stringify(sajuData.geokguk||{}),
          saju_big_luck:      JSON.stringify((sajuData.big_luck||[]).slice(0,5)),
          saju_data_full:     JSON.stringify(sajuData),
          payment_key:        tid||orderId,
          status:             'paid'
        }, dbData.order_id, 'saju_premium');

      } else {
        // 3b. 라이트/프리미엄 웹훅
        updateLoadingText('리포트 제작을 시작합니다...');
        const webhookUrl = reportType==='premium' ? MAKE_PREMIUM : MAKE_LIGHT;
        await callMakeHook(webhookUrl, {
          request_id:       dbData.order_id,
          client_name:      order.name,
          recipient_email:  order.email,
          birth_info_raw:   `${order.birthdate_raw} (${order.calendar}) ${order.hour}시 ${order.min}분 ${order.birthplace}`,
          birth_place_text: order.birthplace,
          place:            order.place_en,
          year:order.year, month:order.month, day:order.day,
          hour:order.hour, min:order.min,
          lat:order.lat, lon:order.lon, tzone:9.0,
          report_type:      reportType,
          doc_name:         `포르투나_${order.name}`,
          dominant_planet:  dominant,
          aspects_summary:  aspects,
          planets_json:     JSON.stringify(planets),
          payment_key:      tid||orderId,
          status:           'paid'
        }, dbData.order_id, reportType);
      }
    }

    sessionStorage.removeItem('pendingOrder');
    showSuccess(order, reportType);

  }catch(err){
    console.error('결제 처리 오류:',err);
    showError('결제 처리 중 오류가 발생했습니다. 결제는 완료되었을 수 있으니 이메일로 문의해주세요.');
  }
}

// 기존 토스 결제 처리 (레거시 대비)
async function processTossPayment(paymentKey, orderId, amount, reportType){
  let order={};
  try{const stored=sessionStorage.getItem('pendingOrder');if(stored)order=JSON.parse(stored);}catch(e){}
  try{
    const dbData={
      order_id:order.order_id||orderId, name:order.name||'', email:order.email||'',
      gender:order.gender||'', birthdate_raw:order.birthdate_raw||'', calendar:order.calendar||'양력',
      year:order.year||0, month:order.month||0, day:order.day||0,
      hour:order.hour||0, min:order.min||0,
      birthplace:order.birthplace||'', place_en:order.place_en||'',
      lat:order.lat||0, lon:order.lon||0, tzone:9.0,
      report_type:reportType, status:'paid',
      payment_key:paymentKey, payment_amount:parseInt(amount)||0
    };
    await sb.from('orders').insert([dbData]);
    if(order.year&&order.lat){
      updateLoadingText('별자리 데이터 계산 중...');
      let planets=[],dominant='Sun',aspects='';
      try{
        const astroRes=await fetch('https://fortuna.kkdmb7.workers.dev/astro',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({day:order.day,month:order.month,year:order.year,hour:order.hour,min:order.min,lat:order.lat,lon:order.lon,tzone:9.0})
        });
        const ad=await astroRes.json();planets=ad.output||ad;dominant=calcDominant(planets);aspects=calcAspects(planets);
      }catch(e){}
      updateLoadingText('리포트 제작을 시작합니다...');
      const webhookUrl=reportType==='premium'?MAKE_PREMIUM:reportType==='saju_premium'?MAKE_SAJU_PREMIUM:MAKE_LIGHT;
      await fetch(webhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_id:dbData.order_id,client_name:order.name,recipient_email:order.email,birth_info_raw:`${order.birthdate_raw} (${order.calendar}) ${order.hour}시 ${order.min}분 ${order.birthplace}`,birth_place_text:order.birthplace,place:order.place_en,year:order.year,month:order.month,day:order.day,hour:order.hour,min:order.min,lat:order.lat,lon:order.lon,tzone:9.0,report_type:reportType,doc_name:`포르투나_${order.name}`,dominant_planet:dominant,aspects_summary:aspects,planets_json:JSON.stringify(planets),payment_key:paymentKey,status:'paid'})});
    }
    sessionStorage.removeItem('pendingOrder');
    showSuccess(order, reportType);
  }catch(err){
    showError('결제 처리 중 오류가 발생했습니다. 이메일로 문의해주세요.');
  }
}
