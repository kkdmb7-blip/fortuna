<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기해일주 도미넌트 행성 확인하기 — FORTUNA</title>
<meta property="og:title" content="기해일주 도미넌트 행성 확인하기 — FORTUNA">
<meta property="og:description" content="기해일주는 62% 확률로 토성이 도미넌트 행성으로 나옵니다. 내 행성도 확인해보세요!">
<meta property="og:image" content="https://fortuna-silk.vercel.app/og-image.png">
<meta property="og:url" content="https://fortuna-silk.vercel.app/planet_기해.html">
<meta property="og:type" content="website">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{--gold:#c9a84c;--purple:#b482ff;--bg:#0d0b14;--card:#16132a;--text:#e8e0f0;--dim:#8a7fa0;--planet:#c9a84c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.container{position:relative;z-index:1;width:100%;max-width:480px;}
.logo{font-family:'Noto Serif KR',serif;letter-spacing:0.3em;color:var(--gold);font-size:14px;text-align:center;margin-bottom:32px;opacity:0.8;}
.hook-card{background:var(--card);border:1px solid rgba(180,130,255,0.2);border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:24px;}
.hook-pill{display:inline-block;background:rgba(180,130,255,0.1);border:1px solid rgba(180,130,255,0.3);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--purple);letter-spacing:0.1em;margin-bottom:20px;}
.hook-pillar{font-size:28px;font-weight:600;color:var(--planet);margin:8px 0;}
.hook-pct{font-size:48px;font-weight:700;color:var(--planet);margin:4px 0;}
.hook-planet{font-size:18px;color:var(--text);margin-bottom:16px;}
.hook-sub{font-size:13px;color:var(--dim);line-height:1.7;}
.planet-icon{font-size:64px;margin:16px 0;}
.cta-btn{display:block;width:100%;padding:18px;background:linear-gradient(135deg,#6c3fa0,#b482ff);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.05em;margin-top:20px;text-decoration:none;transition:opacity 0.2s;}
.cta-btn:hover{opacity:0.85;}
.copy-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:14px;color:var(--text);font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;transition:opacity 0.2s;}
.copy-btn:hover{opacity:0.75;}
.stats-card{background:var(--card);border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:20px;margin-top:16px;}
.stats-title{font-size:12px;color:var(--dim);letter-spacing:0.1em;margin-bottom:16px;text-align:center;}
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.stat-planet{font-size:13px;color:var(--text);width:40px;}
.stat-bar-wrap{flex:1;background:rgba(255,255,255,0.05);border-radius:4px;height:8px;overflow:hidden;}
.stat-bar{height:100%;border-radius:4px;transition:width 0.8s ease;}
.stat-pct{font-size:12px;color:var(--gold);width:36px;text-align:right;}
.stat-count{font-size:11px;color:var(--dim);width:40px;text-align:right;}
.data-note{font-size:11px;color:var(--dim);text-align:center;margin-top:12px;line-height:1.6;}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:20px 0;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>
<div class="container">
  <div class="logo">✦ FORTUNA ✦</div>
  <div class="hook-card">
    <div class="hook-pill">일주 × 도미넌트 행성</div>
    <div class="planet-icon">🪐</div>
    <div class="hook-pillar">기해일주</div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:4px;">도미넌트 행성 추정 확률</div>
    <div class="hook-pct" id="pctText">62%</div>
    <div class="hook-planet">토성(Saturn)</div>
    <div class="hook-sub" id="subText">같은 일주를 가진 사람 중 <strong style="color:var(--planet)">62%</strong>가<br>토성이 도미넌트 행성으로 나옵니다.</div>
    <hr class="divider">
    <div style="font-size:13px;color:var(--dim);line-height:1.7;">내 도미넌트 행성이 정말 토성인지<br>정확한 출생 시간으로 확인해보세요.</div>
    <a class="cta-btn" href="https://fortuna-silk.vercel.app/dominant.html">✦ 내 행성 정확히 확인하기</a>
    <button class="copy-btn" onclick="copyLink()">🔗 링크 복사해서 카카오톡 공유하기</button>
  </div>
  <div class="stats-card">
    <div class="stats-title">📊 기해일주 행성 분포 데이터</div>
    <div id="statsBars"><div class="stat-row"><div class="stat-planet">토성</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:62%;background:#c9a84c"></div></div><div class="stat-pct">62%</div><div class="stat-count">-</div></div><div class="stat-row"><div class="stat-planet">수성</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:38%;background:#7ecbff"></div></div><div class="stat-pct">38%</div><div class="stat-count">-</div></div></div>
    <div class="data-note" id="dataNote">추정 데이터 기반 · 실제 분석 누적 시 업데이트됩니다</div>
  </div>
</div>
<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const pillar='기해';
const shareUrl='https://fortuna-silk.vercel.app/planet_기해.html';

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500);}

function copyLink(){
  navigator.clipboard.writeText(shareUrl)
    .then(()=>showToast('✅ 링크 복사됐어요! 카카오톡에 붙여넣기 하세요.'))
    .catch(()=>{
      const el=document.createElement('textarea');el.value=shareUrl;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
      showToast('✅ 링크 복사됐어요! 카카오톡에 붙여넣기 하세요.');
    });
}

async function loadStats(){
  try{
    const {data:stats}=await sb.from('pillar_planet_stats').select('dominant_planet_kor,dominant_planet').eq('day_pillar',pillar);
    if(!stats||stats.length<100)return;
    const counts={};
    stats.forEach(r=>{counts[r.dominant_planet_kor]=(counts[r.dominant_planet_kor]||0)+1;});
    const total=stats.length;
    const pPct=Math.round((counts['토성']||0)*100/total);
    document.getElementById('pctText').textContent=pPct+'%';
    document.getElementById('subText').innerHTML=`같은 일주를 가진 사람 중 <strong style="color:var(--planet)">${pPct}%</strong>가<br>토성이 도미넌트 행성으로 나옵니다.`;
    const sPct=Math.round((counts['수성']||0)*100/total);
    document.getElementById('dataNote').textContent=`실제 분석 ${total.toLocaleString()}건 기반 데이터`;
  }catch(e){}
}

const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.style.cssText=`position:absolute;background:#fff;border-radius:50%;width:${Math.random()*2}px;height:${Math.random()*2}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${0.1+Math.random()*0.4}`;starsEl.appendChild(s);}

loadStats();
</script>
</body>
</html>
