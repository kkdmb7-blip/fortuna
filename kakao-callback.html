<script>

const REST_API_KEY = "51b4f87ad9cfd6312c176ad34eb62025";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

async function getUser(){

if(!code){
document.body.innerHTML="<h2>로그인 실패</h2>";
return;
}

const tokenRes = await fetch("https://kauth.kakao.com/oauth/token",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`grant_type=authorization_code&client_id=${REST_API_KEY}&redirect_uri=https://fortuna-silk.vercel.app/kakao-callback.html&code=${code}`
});

const tokenData = await tokenRes.json();

const access_token = tokenData.access_token;

const userRes = await fetch("https://kapi.kakao.com/v2/user/me",{
headers:{
Authorization:`Bearer ${access_token}`
}
});

const user = await userRes.json();

document.body.innerHTML = `
<h2>카카오 로그인 성공</h2>
<p>닉네임 : ${user.kakao_account.profile.nickname}</p>
<p>ID : ${user.id}</p>
`;

console.log(user);

}

getUser();

</script>
