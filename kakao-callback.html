<script>

const REST_API_KEY = "51b4f87ad9cfd6312c176ad34eb62025";
const SUPABASE_URL = "https://kkdmb7-blip.supabase.co";
const SUPABASE_KEY = "sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

async function getUser(){

if(!code){
document.body.innerHTML="인가코드 없음";
return;
}

const tokenRes = await fetch("https://kauth.kakao.com/oauth/token",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`grant_type=authorization_code&client_id=${REST_API_KEY}&redirect_uri=https://fortuna-silk.vercel.app/kakao-callback.html&code=${code}`
});

const tokenData = await tokenRes.json();
const access_token = tokenData.access_token;

const userRes = await fetch("https://kapi.kakao.com/v2/user/me",{
headers:{
Authorization:`Bearer ${access_token}`
}
});

const userData = await userRes.json();

const user={
id:userData.id,
nickname:userData.properties.nickname
};

localStorage.setItem("fortuna_login","1");
localStorage.setItem("fortuna_user",JSON.stringify(user));

await fetch("https://kkdmb7-blip.supabase.co/rest/v1/users",{
method:"POST",
headers:{
"apikey":"sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11",
"Authorization":"Bearer sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11",
"Content-Type":"application/json",
"Prefer":"return=minimal"
},
body:JSON.stringify({
kakao_id:user.id,
nickname:user.nickname
})
});

window.location.href="/";

}

getUser();

</script>
