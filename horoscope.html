<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTUNA — 오늘의 운세</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;--gold:#d4af37;--gold-light:#e8cc7a;
    --text:#ede6f8;--text-dim:#8a7fa0;--border:rgba(212,175,55,0.18);
    --card-bg:rgba(30,18,55,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* 배경 */
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  
  

  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);border-bottom:1px solid rgba(212,175,55,0.07);}
    .nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--gold);font-size:14px;letter-spacing:0.2em;font-weight:700;font-family:'Noto Serif KR',serif;}
  .nav-brand img{height:44px;object-fit:contain;flex-shrink:0;}
  .nav-back{font-size:11px;color:var(--text-dim);text-decoration:none;letter-spacing:0.1em;transition:color 0.2s;}
  .nav-back:hover{color:var(--gold);}

  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:110px 20px 80px;}

  /* 헤더 */
  .header{text-align:center;margin-bottom:44px;}
  .eyebrow{font-size:10px;letter-spacing:0.5em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;opacity:0;animation:fadeUp 0.8s ease forwards 0.2s;}
  .today-date{font-size:13px;color:var(--text-dim);margin-bottom:6px;opacity:0;animation:fadeUp 0.8s ease forwards 0.3s;}
  .title{font-size:34px;font-weight:300;line-height:1.3;margin-bottom:10px;opacity:0;animation:fadeUp 0.8s ease forwards 0.4s;}
  .subtitle{font-size:13px;color:var(--text-dim);line-height:1.8;opacity:0;animation:fadeUp 0.8s ease forwards 0.5s;}

  /* 입력 폼 */
  .form-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;backdrop-filter:blur(10px);opacity:0;animation:fadeUp 0.8s ease forwards 0.6s;}
  .field{margin-bottom:16px;}
  .label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:8px;letter-spacing:0.08em;}
  .input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(212,175,55,0.18);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color 0.3s;-webkit-appearance:none;}
  .input:focus{border-color:var(--gold);background:rgba(212,175,55,0.03);}
  select.input option{background:#120820;}
  .btn{width:100%;background:linear-gradient(135deg,#d4af37 0%,#e8cc7a 50%,#d4af37 100%);border:none;border-radius:12px;padding:15px;color:#06020f;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.08em;cursor:pointer;transition:all 0.3s;margin-top:4px;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,175,55,0.35);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
  

  /* 결과 영역 */
  .result-area{display:none;animation:fadeUp 0.7s ease;}

  /* 사용자 헤더 */
  .user-header{text-align:center;margin-bottom:28px;padding:24px;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(10px);}
  .user-sign{font-size:36px;margin-bottom:8px;}
  .user-name-text{font-size:18px;font-weight:300;color:var(--gold);letter-spacing:0.05em;margin-bottom:4px;}
  .user-sign-name{font-size:12px;color:var(--text-dim);letter-spacing:0.1em;}

  /* 탭 */
  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .tab{background:rgba(255,255,255,0.03);border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:all 0.25s;font-family:'Noto Sans KR',sans-serif;}
  .tab:hover{border-color:rgba(212,175,55,0.3);background:rgba(212,175,55,0.05);}
  .tab.active{background:rgba(212,175,55,0.1);border-color:var(--gold);}
  .tab-emoji{font-size:20px;display:block;margin-bottom:4px;}
  .tab-label{font-size:10px;color:var(--text-dim);letter-spacing:0.08em;}
  .tab.active .tab-label{color:var(--gold);}

  /* 운세 카드 */
  .fortune-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:32px;backdrop-filter:blur(10px);min-height:200px;display:none;}
  .fortune-card.active{display:block;animation:fadeUp 0.4s ease;}
  .fortune-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .fortune-icon{font-size:28px;}
  .fortune-title{font-size:15px;color:var(--gold);letter-spacing:0.08em;}

  /* 별점 */
  .fortune-stars{display:flex;gap:4px;margin-bottom:20px;}
  .star-item{font-size:16px;color:rgba(212,175,55,0.25);transition:color 0.1s;}
  .star-item.filled{color:var(--gold);}

  .fortune-text{font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;}

  /* 로딩 */
  .loading-wrap{text-align:center;padding:40px 0;}
  .loading-orb{width:48px;height:48px;border-radius:50%;border:2px solid rgba(212,175,55,0.15);border-top-color:var(--gold);animation:spin 1s linear infinite;margin:0 auto 16px;}
  .loading-text{font-size:13px;color:var(--text-dim);letter-spacing:0.1em;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 업셀 */
  .upsell{margin-top:20px;background:linear-gradient(135deg,rgba(45,20,80,0.4),rgba(10,4,25,0.6));border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;}
  .upsell-text{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:16px;}
  .upsell-btn{display:inline-block;background:linear-gradient(135deg,#d4af37,#e8cc7a);border-radius:50px;padding:12px 28px;color:#06020f;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.3s;letter-spacing:0.05em;}
  .upsell-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,175,55,0.4);}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(212,175,55,0.12);border:1px solid var(--gold);border-radius:50px;padding:11px 24px;color:var(--gold);font-size:12px;z-index:999;transition:transform 0.3s;backdrop-filter:blur(10px);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:400px){.tabs{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-nebula"></div>
  <div id="bgStars"></div>
</div>
<div class="toast" id="toast"></div>

<nav>
  <a href="https://picolab.kr" class="nav-brand"><img src="/icon.svg" alt="">FORTUNA</a>
  <a href="/" class="nav-back">← 메인으로</a>
</nav>

<div class="wrap">
  <div class="header">
    <div class="eyebrow">오늘의 운세</div>
    <div class="today-date" id="todayDate"></div>
    <h1 class="title">오늘 하늘이<br>당신에게 하는 말</h1>
    <p class="subtitle">생년월일을 입력하면 오늘 날짜에 맞는<br>개인 맞춤 운세를 드려요</p>
  </div>

  <div class="form-card" id="formCard">
    <div class="field">
      <label class="label">생년월일 *</label>
      <input type="text" id="birth" class="input" placeholder="예: 1990.03.15">
    </div>
    <div class="field">
      <label class="label">출생시간 <span style="font-size:11px;color:var(--text-dim)">(모르면 공란)</span></label>
      <input type="text" id="time" class="input" placeholder="예: 14:30">
    </div>
    <div class="field">
      <label class="label">태어난 지역 *</label>
      <select id="place" class="input">
        <option value="">지역 선택</option>
        <option>강릉</option><option>거제</option><option>경주</option>
        <option>고양</option><option>광명</option><option>광주</option>
        <option>구미</option><option>군산</option><option>김해</option>
        <option>남양주</option><option>대구</option><option>대전</option>
        <option>목포</option><option>부산</option><option>부천</option>
        <option>사천</option><option>서울</option><option>성남</option>
        <option>수원</option><option>순천</option><option>시흥</option>
        <option>아산</option><option>안산</option><option>안성</option>
        <option>안양</option><option>양산</option><option>여수</option>
        <option>오산</option><option>용인</option><option>원주</option>
        <option>의정부</option><option>이천</option><option>인천</option>
        <option>전주</option><option>제주</option><option>진주</option>
        <option>창원</option><option>천안</option><option>청주</option>
        <option>춘천</option><option>통영</option><option>평택</option>
        <option>포항</option><option>하남</option><option>화성</option>
        <option>울산</option>
      </select>
    </div>
    <button class="btn" id="calcBtn" onclick="getHoroscope()">✦ 오늘의 운세 보기</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="user-header">
      <div class="user-sign" id="userSign"></div>
      <div class="user-name-text" id="userName"></div>
      <div class="user-sign-name" id="userSignName"></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">
        <span class="tab-emoji">🌟</span>
        <span class="tab-label">전체운</span>
      </div>
      <div class="tab" onclick="switchTab(1)">
        <span class="tab-emoji">💗</span>
        <span class="tab-label">애정운</span>
      </div>
      <div class="tab" onclick="switchTab(2)">
        <span class="tab-emoji">💰</span>
        <span class="tab-label">금전운</span>
      </div>
      <div class="tab" onclick="switchTab(3)">
        <span class="tab-emoji">🌿</span>
        <span class="tab-label">건강운</span>
      </div>
    </div>

    <div class="fortune-card active" id="card0">
      <div class="loading-wrap">
        <div class="loading-orb"></div>
        <div class="loading-text">오늘의 운세를 읽어오는 중...</div>
      </div>
    </div>
    <div class="fortune-card" id="card1"></div>
    <div class="fortune-card" id="card2"></div>
    <div class="fortune-card" id="card3"></div>

    <div class="upsell" id="upsellBox" style="display:none;">
      <p class="upsell-text">오늘 하루의 운세가 궁금하셨다면,<br>당신의 삶 전체 구조가 더 궁금하지 않으신가요?<br>라이트 리포트에서 깊이 있는 이야기를 이어가요.</p>
      <a href="light.html" class="upsell-btn">✦ 라이트 리포트 9,900원</a>
    </div>
  </div>
</div>

<script>
const CITIES={
  '강릉':{lat:37.7519,lon:128.8761},'거제':{lat:34.8803,lon:128.6219},
  '경주':{lat:35.8562,lon:129.2247},'고양':{lat:37.6584,lon:126.8320},
  '광명':{lat:37.4789,lon:126.8643},'광주':{lat:35.1595,lon:126.8526},
  '구미':{lat:36.1196,lon:128.3446},'군산':{lat:35.9675,lon:126.7368},
  '김해':{lat:35.2341,lon:128.8893},'남양주':{lat:37.6359,lon:127.2168},
  '대구':{lat:35.8714,lon:128.6014},'대전':{lat:36.3504,lon:127.3845},
  '목포':{lat:34.8118,lon:126.3922},'부산':{lat:35.1796,lon:129.0756},
  '부천':{lat:37.5034,lon:126.7660},'사천':{lat:35.0035,lon:128.0645},
  '서울':{lat:37.5665,lon:126.9780},'성남':{lat:37.4386,lon:127.1378},
  '수원':{lat:37.2636,lon:127.0286},'순천':{lat:34.9506,lon:127.4872},
  '시흥':{lat:37.3797,lon:126.8031},'아산':{lat:36.7897,lon:127.0023},
  '안산':{lat:37.3219,lon:126.8309},'안성':{lat:37.0078,lon:127.2797},
  '안양':{lat:37.3943,lon:126.9568},'양산':{lat:35.3350,lon:129.0371},
  '여수':{lat:34.7604,lon:127.6622},'오산':{lat:37.1498,lon:127.0774},
  '용인':{lat:37.2411,lon:127.1775},'원주':{lat:37.3420,lon:127.9202},
  '의정부':{lat:37.7381,lon:127.0472},'이천':{lat:37.2721,lon:127.4350},
  '인천':{lat:37.4563,lon:126.7052},'전주':{lat:35.8242,lon:127.1480},
  '제주':{lat:33.4996,lon:126.5312},'진주':{lat:35.1799,lon:128.1076},
  '창원':{lat:35.2280,lon:128.6811},'천안':{lat:36.8151,lon:127.1139},
  '청주':{lat:36.6424,lon:127.4890},'춘천':{lat:37.8813,lon:127.7298},
  '통영':{lat:34.8544,lon:128.4330},'평택':{lat:36.9921,lon:127.1128},
  '포항':{lat:36.0190,lon:129.3435},'하남':{lat:37.5392,lon:127.2148},
  '화성':{lat:37.1996,lon:126.8317},'울산':{lat:35.5384,lon:129.3114},
};

const SIGN_NAMES=['양자리','황소자리','쌍둥이자리','게자리','사자자리','처녀자리','천칭자리','전갈자리','사수자리','염소자리','물병자리','물고기자리'];
const SIGN_EMOJI=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const CATEGORY_INFO=[
  {id:'overall', emoji:'🌟', title:'전체운', label:'전체운'},
  {id:'love',    emoji:'💗', title:'애정운', label:'애정운'},
  {id:'money',   emoji:'💰', title:'금전운', label:'금전운'},
  {id:'health',  emoji:'🌿', title:'건강운', label:'건강운'},
];

let fortuneData={};
let currentTab=0;

// 오늘 날짜 표시
const now=new Date();
document.getElementById('todayDate').textContent=
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${['일','월','화','수','목','금','토'][now.getDay()]}요일`;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function parseBirthdate(str){
  const clean=str.replace(/[^0-9]/g,'');
  if(clean.length===8){
    const y=parseInt(clean.slice(0,4)),m=parseInt(clean.slice(4,6)),d=parseInt(clean.slice(6,8));
    if(y<1900||y>now.getFullYear()||m<1||m>12||d<1||d>31)return null;
    return{year:y,month:m,day:d};
  }
  const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);
  if(p.length<3)return null;
  const y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  if(y<1900||y>now.getFullYear()||m<1||m>12||d<1||d>31)return null;
  return{year:y,month:m,day:d};
}

function parseTime(str){
  if(!str||!str.trim())return{hour:12,min:0};
  const clean=str.replace(/[^0-9]/g,'');
  let h,m;
  if(clean.length===3){h=parseInt(clean.slice(0,1));m=parseInt(clean.slice(1));}
  else if(clean.length===4){h=parseInt(clean.slice(0,2));m=parseInt(clean.slice(2));}
  else{const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);h=parseInt(p[0])||12;m=parseInt(p[1])||0;}
  if(h<0||h>23||m<0||m>59)return{hour:12,min:0};
  return{hour:h,min:m};
}

function getSign(deg){
  return Math.floor(((deg%360)+360)%360/30);
}

function starsHtml(n){
  let h='<div class="fortune-stars">';
  for(let i=1;i<=5;i++)h+=`<span class="star-item${i<=n?' filled':''}">${i<=n?'★':'☆'}</span>`;
  return h+'</div>';
}

function renderCard(idx, data){
  const info=CATEGORY_INFO[idx];
  const card=document.getElementById('card'+idx);
  card.innerHTML=`
    <div class="fortune-header">
      <span class="fortune-icon">${info.emoji}</span>
      <span class="fortune-title">${info.title}</span>
    </div>
    ${starsHtml(data.stars||3)}
    <div class="fortune-text">${data.text||''}</div>
  `;
}

function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.fortune-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  currentTab=idx;
}

async function fetchFortune(signName, signIdx, todayStr, category, moonSign){
  const res=await fetch('/api/horoscope',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({signName, moonSign, todayStr, category})
  });
  const data=await res.json();
  return{stars:data.stars||3, text:data.text||''};
}

async function getHoroscope(){
  const birthVal=document.getElementById('birth').value.trim();
  const placeVal=document.getElementById('place').value;
  if(!birthVal||!placeVal){showToast('생년월일과 지역을 입력해주세요');return;}
  const bd=parseBirthdate(birthVal);
  if(!bd){showToast('생년월일 형식을 확인해주세요');return;}
  const city=CITIES[placeVal];
  if(!city){showToast('지역을 선택해주세요');return;}
  const bt=parseTime(document.getElementById('time').value);

  const btn=document.getElementById('calcBtn');
  btn.disabled=true;btn.innerHTML='잠시만요...';

  try{
    // 1. 행성 위치 가져오기
    const res=await fetch('https://fortuna.kkdmb7.workers.dev/astro',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({day:bd.day,month:bd.month,year:bd.year,hour:bt.hour,min:bt.min,lat:city.lat,lon:city.lon,tzone:9.0})
    });
    const pData=await res.json();
    const planets=pData.output||pData;

    const sun=planets.find(p=>p.name==='Sun');
    const moon=planets.find(p=>p.name==='Moon');
    const signIdx=sun?getSign(sun.fullDegree):0;
    const signName=SIGN_NAMES[signIdx];
    const moonSign=moon?SIGN_NAMES[getSign(moon.fullDegree)]:'';

    const planetInfo=`달자리: ${moonSign}, 출생 하우스 정보 포함`;
    const todayStr=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

    // 2. 결과 영역 표시
    document.getElementById('userSign').textContent=SIGN_EMOJI[signIdx];
    document.getElementById('userName').textContent=signName;
    document.getElementById('userSignName').textContent=`태양 ${signName} · 달 ${moonSign}`;
    document.getElementById('formCard').style.display='none';
    document.getElementById('resultArea').style.display='block';
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});

    // 3. 4개 운세 병렬 생성
    const categories=['overall','love','money','health'];
    const promises=categories.map((cat,i)=>
      fetchFortune(signName,signIdx,todayStr,cat,moonSign)
        .then(data=>{
          fortuneData[i]=data;
          renderCard(i,data);
          if(i===0)document.getElementById('upsellBox').style.display='block';
        })
    );
    await Promise.all(promises);

  }catch(e){
    showToast('오류가 발생했어요. 다시 시도해주세요');
    console.error(e);
    document.getElementById('formCard').style.display='block';
    document.getElementById('resultArea').style.display='none';
  }
  btn.disabled=false;btn.textContent='✦ 오늘의 운세 보기';
}

// 별 배경
const bg=document.getElementById('bgStars');
for(let i=0;i<120;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+0.3;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${0.08+Math.random()*0.35};`;
  bg.appendChild(s);
}
</script>
