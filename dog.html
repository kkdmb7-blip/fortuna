<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTUNA — 강아지 궁합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;--gold:#d4af37;--gold-light:#e8cc7a;
    --text:#ede6f8;--text-dim:#8a7fa0;--border:rgba(212,175,55,0.18);
    --warm:#f5e6c8;--paw:rgba(212,175,55,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* 배경 */
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .bg-glow{position:absolute;inset:0;background:
    radial-gradient(ellipse 50% 40% at 10% 15%,rgba(80,40,120,0.4) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 85%,rgba(40,20,80,0.5) 0%,transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%,rgba(10,10,15,0.97) 0%,transparent 100%);}

  /* 별똥별 효과 */
  .paw-bg{position:absolute;inset:0;overflow:hidden;}
  .paw{position:absolute;font-size:20px;opacity:0.04;animation:floatPaw linear infinite;}
  @keyframes floatPaw{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:0.04;}90%{opacity:0.04;}100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);border-bottom:1px solid rgba(212,175,55,0.07);}
    .nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--gold);font-size:14px;letter-spacing:0.2em;font-weight:700;font-family:'Noto Serif KR',serif;}
  .nav-brand img{height:44px;object-fit:contain;flex-shrink:0;}
  .nav-back{font-size:11px;color:var(--text-dim);text-decoration:none;letter-spacing:0.1em;transition:color 0.2s;}
  .nav-back:hover{color:var(--gold);}

  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:110px 20px 80px;}

  /* 헤더 */
  .header{text-align:center;margin-bottom:44px;}
  .header-icon{font-size:52px;margin-bottom:16px;display:block;animation:bounce 2s ease infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .eyebrow{font-size:10px;letter-spacing:0.5em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;opacity:0;animation:fadeUp 0.8s ease forwards 0.2s;}
  .title{font-size:30px;font-weight:300;line-height:1.4;margin-bottom:10px;opacity:0;animation:fadeUp 0.8s ease forwards 0.4s;}
  .subtitle{font-size:13px;color:var(--text-dim);line-height:1.9;opacity:0;animation:fadeUp 0.8s ease forwards 0.6s;}

  /* 입력 카드 */
  .cards-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .input-card{background:linear-gradient(135deg,rgba(45,25,75,0.45),rgba(10,5,20,0.65));border:1px solid var(--border);border-radius:14px;padding:24px 20px;backdrop-filter:blur(10px);}
  .card-icon{font-size:28px;margin-bottom:10px;display:block;}
  .card-who{font-size:10px;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.06em;}
  .input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(212,175,55,0.15);border-radius:9px;padding:11px 13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color 0.3s;-webkit-appearance:none;}
  .input:focus{border-color:var(--gold);}

  .btn{width:100%;background:linear-gradient(135deg,#7b5ea7,#a07fd4);border:none;border-radius:12px;padding:15px;color:#06020f;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s;letter-spacing:0.05em;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,175,55,0.35);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
  
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

  /* 결과 */
  .result{display:none;margin-top:24px;animation:fadeUp 0.7s ease;}

  /* 점수 카드 */
  .score-card{background:linear-gradient(135deg,rgba(45,25,75,0.5),rgba(10,5,20,0.7));border:1px solid var(--gold);border-radius:16px;padding:36px 28px;text-align:center;margin-bottom:16px;backdrop-filter:blur(10px);}
  .pair-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px;font-size:13px;color:var(--text-dim);}
  .pair-sign{font-size:28px;}
  .pair-x{font-size:18px;color:var(--gold);}
  .score-circle{width:130px;height:130px;border-radius:50%;border:2px solid var(--gold);display:flex;flex-direction:column;justify-content:center;align-items:center;margin:0 auto 16px;background:rgba(212,175,55,0.04);position:relative;}
  .score-circle::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(212,175,55,0.15);}
  .score-num{font-size:44px;font-weight:300;color:var(--gold);line-height:1;}
  .score-unit{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .score-title{font-size:19px;font-weight:300;margin-bottom:8px;}
  .score-desc{font-size:13px;color:var(--text-dim);line-height:1.9;}

  /* 상세 카드 */
  .detail-card{background:linear-gradient(135deg,rgba(35,20,60,0.4),rgba(10,5,20,0.6));border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:12px;backdrop-filter:blur(10px);}
  .detail-title{font-size:11px;letter-spacing:0.3em;color:var(--gold);margin-bottom:16px;text-transform:uppercase;}
  .detail-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(212,175,55,0.07);}
  .detail-item:last-child{border-bottom:none;}
  .detail-emoji{font-size:18px;min-width:24px;}
  .detail-text{font-size:13px;color:var(--text-dim);line-height:1.8;}
  .detail-text strong{color:var(--text);font-weight:500;}

  /* 업셀 */
  .upsell{background:linear-gradient(135deg,rgba(45,25,75,0.35),rgba(10,5,20,0.55));border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center;margin-top:4px;}
  .upsell-text{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:16px;}
  .upsell-btn{display:inline-block;background:linear-gradient(135deg,#d4af37,#e8cc7a);border-radius:50px;padding:12px 28px;color:#06020f;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.3s;}
  .upsell-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,175,55,0.35);}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(212,175,55,0.12);border:1px solid var(--gold);border-radius:50px;padding:11px 24px;color:var(--gold);font-size:12px;z-index:999;transition:transform 0.3s;backdrop-filter:blur(10px);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:480px){
    .cards-row{gap:10px;}
    .input-card{padding:16px 12px;}
    .input{padding:9px 11px;font-size:12px;}
    .card-icon{font-size:22px;margin-bottom:6px;}
    .card-who{margin-bottom:10px;}
  }
</style>
</head>
<body>
<div class="bg">
  <div class="bg-glow"></div>
  <div class="paw-bg" id="pawBg"></div>
</div>
<div class="toast" id="toast"></div>

<nav>
  <a href="https://picolab.kr" class="nav-brand"><img src="/icon.svg" alt="">FORTUNA</a>
  <a href="/" class="nav-back">← 메인으로</a>
</nav>

<div class="wrap">
  <div class="header">
    <span class="header-icon">🐾</span>
    <div class="eyebrow">강아지 궁합</div>
    <h1 class="title">나와 우리 강아지,<br>별자리 궁합은?</h1>
    <p class="subtitle">보호자와 강아지의 태양자리로<br>두 사람의 에너지가 얼마나 잘 맞는지 확인해봐요</p>
  </div>

  <div class="cards-row">
    <div class="input-card">
      <span class="card-icon">🧑</span>
      <div class="card-who">보호자</div>
      <div class="field">
        <label class="label">생년월일 *</label>
        <input type="text" id="humanBirth" class="input" placeholder="1990.03.15">
      </div>
    </div>
    <div class="input-card">
      <span class="card-icon">🐶</span>
      <div class="card-who">강아지</div>
      <div class="field">
        <label class="label">생년월일 *</label>
        <input type="text" id="dogBirth" class="input" placeholder="2020.06.10">
      </div>
      <div class="field">
        <label class="label">이름 (선택)</label>
        <input type="text" id="dogName" class="input" placeholder="예: 콩이">
      </div>
    </div>
  </div>

  <button class="btn" id="calcBtn" onclick="calcDogCompat()">🐾 궁합 확인하기</button>

  <div class="result" id="result">
    <div class="score-card">
      <div class="pair-row">
        <div>
          <div class="pair-sign" id="humanSignEmoji"></div>
          <div style="font-size:11px;margin-top:4px;" id="humanSignName"></div>
        </div>
        <div class="pair-x">×</div>
        <div>
          <div class="pair-sign" id="dogSignEmoji"></div>
          <div style="font-size:11px;margin-top:4px;" id="dogSignName"></div>
        </div>
      </div>
      <div class="score-circle" id="scoreCircle">
        <div class="score-num" id="scoreNum"></div>
        <div class="score-unit">/ 100</div>
      </div>
      <div class="score-title" id="scoreTitle"></div>
      <div class="score-desc" id="scoreDesc"></div>
    </div>

    <div class="detail-card" id="goodCard">
      <div class="detail-title">✦ 이런 점이 잘 맞아요</div>
      <div id="goodList"></div>
    </div>

    <div class="detail-card" id="tipCard">
      <div class="detail-title">🐾 같이 살면 이런 모습이에요</div>
      <div id="tipList"></div>
    </div>

    <div class="upsell">
      <p class="upsell-text">강아지와의 궁합이 궁금했다면,<br>나 자신의 에너지 구조도 궁금하지 않으세요?<br>라이트 리포트에서 더 깊은 이야기를 확인해봐요.</p>
      <a href="light.html" class="upsell-btn">✦ 라이트 리포트 9,900원</a>
    </div>
  </div>
</div>

<script>
const SIGNS=[
  {name:'양자리',emoji:'♈',element:'불',dates:[[3,21],[4,19]]},
  {name:'황소자리',emoji:'♉',element:'흙',dates:[[4,20],[5,20]]},
  {name:'쌍둥이자리',emoji:'♊',element:'바람',dates:[[5,21],[6,20]]},
  {name:'게자리',emoji:'♋',element:'물',dates:[[6,21],[7,22]]},
  {name:'사자자리',emoji:'♌',element:'불',dates:[[7,23],[8,22]]},
  {name:'처녀자리',emoji:'♍',element:'흙',dates:[[8,23],[9,22]]},
  {name:'천칭자리',emoji:'♎',element:'바람',dates:[[9,23],[10,22]]},
  {name:'전갈자리',emoji:'♏',element:'물',dates:[[10,23],[11,21]]},
  {name:'사수자리',emoji:'♐',element:'불',dates:[[11,22],[12,21]]},
  {name:'염소자리',emoji:'♑',element:'흙',dates:[[12,22],[1,19]]},
  {name:'물병자리',emoji:'♒',element:'바람',dates:[[1,20],[2,18]]},
  {name:'물고기자리',emoji:'♓',element:'물',dates:[[2,19],[3,20]]},
];

// 별자리별 강아지 성향
const DOG_TRAITS={
  '양자리':'에너자이저 강아지예요. 산책을 엄청 좋아하고 새로운 것에 거침없이 달려들어요.',
  '황소자리':'루틴을 사랑하는 강아지예요. 밥 시간, 산책 시간이 규칙적이면 제일 행복해해요.',
  '쌍둥이자리':'사교적이고 호기심 많은 강아지예요. 다양한 사람과 강아지를 만나는 걸 즐겨요.',
  '게자리':'집순이 강아지예요. 보호자 곁에 딱 붙어있고 낯선 곳보다 집이 최고예요.',
  '사자자리':'주인공 기질이 있는 강아지예요. 칭찬받는 걸 너무 좋아하고 관심받고 싶어해요.',
  '처녀자리':'깔끔하고 섬세한 강아지예요. 청결한 환경을 좋아하고 스트레스에 민감해요.',
  '천칭자리':'평화로운 강아지예요. 갈등 상황을 싫어하고 분위기가 좋을 때 가장 활발해요.',
  '전갈자리':'충성스럽고 강렬한 강아지예요. 보호자에게 깊이 빠져들고 낯선 사람에겐 경계심이 강해요.',
  '사수자리':'자유로운 영혼의 강아지예요. 넓은 공간에서 뛰어다니는 걸 가장 좋아해요.',
  '염소자리':'침착하고 듬직한 강아지예요. 훈련을 잘 따르고 책임감 있게 행동해요.',
  '물병자리':'독립적이고 개성 있는 강아지예요. 혼자 있는 시간도 잘 견디고 독특한 행동을 해요.',
  '물고기자리':'감수성 풍부한 강아지예요. 보호자 기분을 귀신같이 알아차리고 함께 울어줘요.',
};

// 원소별 궁합 점수
const ELEMENT_COMPAT={
  '불-불':85,'불-바람':90,'불-흙':65,'불-물':55,
  '바람-불':90,'바람-바람':80,'바람-흙':60,'바람-물':75,
  '흙-불':65,'흙-바람':60,'흙-흙':88,'흙-물':82,
  '물-불':55,'물-바람':75,'물-흙':82,'물-물':87,
};

// 별자리 조합별 특별 메시지
const COMBO_MSG={
  '게자리-게자리':{good:['둘 다 집을 사랑해요','감정적 교감이 깊어요'],tip:['집에서 같이 뒹굴거리는 하루가 최고예요','분리불안이 생길 수 있으니 독립심 훈련도 해줘요']},
  '사자자리-양자리':{good:['에너지 레벨이 딱 맞아요','같이 있으면 둘 다 신나요'],tip:['활동량이 많아서 야외 시간이 충분해야 해요','주도권 다툼이 생길 수 있으니 리더십을 명확히 해줘요']},
  '물고기자리-전갈자리':{good:['감정적으로 깊이 연결돼요','서로의 기분을 잘 알아요'],tip:['조용하고 평화로운 환경이 둘 다에게 좋아요','강아지가 보호자 감정에 매우 민감하게 반응해요']},
};

function getSign(month, day){
  for(const s of SIGNS){
    const [[sm,sd],[em,ed]]=s.dates;
    if(sm<=em){if(month===sm&&day>=sd)return s;if(month===em&&day<=ed)return s;if(month>sm&&month<em)return s;}
    else{if(month===sm&&day>=sd)return s;if(month===em&&day<=ed)return s;if(month>sm||month<em)return s;}
  }
  return SIGNS[0];
}

function parseBirth(str){
  const clean=str.replace(/[^0-9]/g,'');
  if(clean.length===8){
    return{year:parseInt(clean.slice(0,4)),month:parseInt(clean.slice(4,6)),day:parseInt(clean.slice(6,8))};
  }
  const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);
  if(p.length<3)return null;
  return{year:parseInt(p[0]),month:parseInt(p[1]),day:parseInt(p[2])};
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function calcDogCompat(){
  const hb=parseBirth(document.getElementById('humanBirth').value);
  const db=parseBirth(document.getElementById('dogBirth').value);
  const dogName=document.getElementById('dogName').value.trim()||'강아지';

  if(!hb||!db){showToast('생년월일을 올바르게 입력해주세요');return;}

  const hSign=getSign(hb.month,hb.day);
  const dSign=getSign(db.month,db.day);

  // 점수 계산
  const elementKey=`${hSign.element}-${dSign.element}`;
  let score=ELEMENT_COMPAT[elementKey]||70;

  // 같은 별자리 보너스
  if(hSign.name===dSign.name)score=Math.min(99,score+5);

  // 결과 등급
  let title,desc,color;
  if(score>=85){
    title='천생연분이에요 🐾';
    desc=`${dogName}와 보호자님은 에너지가 정말 잘 맞는 조합이에요. 함께 있을수록 서로가 편안해지는 관계예요.`;
    color='#88cc88';
  }else if(score>=72){
    title='잘 맞는 한 쌍이에요 ✦';
    desc=`대체로 편안한 관계예요. 서로 다른 점이 있어도 그게 오히려 균형을 만들어줘요.`;
    color='var(--gold)';
  }else if(score>=58){
    title='노력하면 더 깊어져요 🌙';
    desc=`에너지가 조금 다르지만, 서로를 이해하려는 노력이 쌓이면 특별한 유대감이 생겨요.`;
    color='#e8cc7a';
  }else{
    title='반대 매력 커플이에요 ⚡';
    desc=`에너지 스타일이 달라서 처음엔 낯설 수 있지만, 서로에게서 배울 것이 많은 조합이에요.`;
    color='#cc9988';
  }

  // 조합별 특별 메시지 또는 기본
  const comboKey=`${hSign.name}-${dSign.name}`;
  const reverseKey=`${dSign.name}-${hSign.name}`;
  const combo=COMBO_MSG[comboKey]||COMBO_MSG[reverseKey];

  const goodItems=combo?.good||[
    `${hSign.element} 에너지와 ${dSign.element} 에너지가 만나 ${score>=72?'조화로운':'독특한'} 시너지를 만들어요`,
    `보호자님의 ${hSign.name} 기질이 ${dogName}의 ${dSign.name} 성향을 잘 이해해줄 수 있어요`,
    `함께하는 시간이 쌓일수록 서로를 더 깊이 이해하게 돼요`,
  ];

  const tipItems=combo?.tip||[
    `${DOG_TRAITS[dSign.name]}`,
    `${hSign.name} 보호자는 ${score>=72?'자연스럽게 잘 맞춰줄 수 있어요':'에너지 차이를 인식하고 맞춰주면 더 좋아요'}`,
    `둘이 가장 행복한 순간 → ${dSign.element==='불'?'활발한 야외 활동':dSign.element==='물'?'조용한 집에서 함께':dSign.element==='바람'?'다양한 사람들과 만남':'안정적인 루틴과 규칙'}`,
  ];

  // DOM 업데이트
  document.getElementById('humanSignEmoji').textContent=hSign.emoji;
  document.getElementById('humanSignName').textContent=hSign.name;
  document.getElementById('dogSignEmoji').textContent=dSign.emoji;
  document.getElementById('dogSignName').textContent=`${dogName} · ${dSign.name}`;
  document.getElementById('scoreNum').textContent=score;
  document.getElementById('scoreCircle').style.borderColor=color;
  document.getElementById('scoreNum').style.color=color;
  document.getElementById('scoreTitle').textContent=title;
  document.getElementById('scoreTitle').style.color=color;
  document.getElementById('scoreDesc').textContent=desc;

  document.getElementById('goodList').innerHTML=goodItems.map(t=>
    `<div class="detail-item"><span class="detail-emoji">✦</span><span class="detail-text">${t}</span></div>`
  ).join('');

  document.getElementById('tipList').innerHTML=tipItems.map((t,i)=>
    `<div class="detail-item"><span class="detail-emoji">${['🐾','🌙','💛'][i]||'🐾'}</span><span class="detail-text">${t}</span></div>`
  ).join('');

  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

// 발바닥 배경
const pawBg=document.getElementById('pawBg');
for(let i=0;i<15;i++){
  const p=document.createElement('div');
  p.className='paw';
  p.textContent='🐾';
  p.style.cssText=`left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;font-size:${14+Math.random()*20}px;`;
  pawBg.appendChild(p);
}
</script>
</body>
