<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포르투나 — AI 점성 상담</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --void:#05020e;--gold:#c9a84c;--gold-light:#e8cc7a;
    --text:#ede6f8;--text-dim:#9b8fb0;--border:rgba(201,168,76,0.2);
    --bubble-user:rgba(201,168,76,0.12);--bubble-ai:rgba(45,31,78,0.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text);font-family:'Pretendard',sans-serif;min-height:100vh;overflow:hidden;}
  .nebula{position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(45,31,78,0.5) 0%,transparent 70%),
    radial-gradient(ellipse 80% 50% at 80% 70%,rgba(20,10,40,0.8) 0%,transparent 70%);}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:var(--op);}}

  /* 인증 화면 */
  .auth-wrap{position:relative;z-index:1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
  .auth-box{background:linear-gradient(135deg,rgba(45,31,78,0.9),rgba(10,6,18,0.95));border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
  .auth-symbol{font-size:32px;margin-bottom:16px;}
  .auth-brand{font-size:11px;letter-spacing:0.5em;color:var(--gold);margin-bottom:8px;}
  .auth-title{font-size:24px;font-weight:300;margin-bottom:8px;}
  .auth-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px;line-height:1.6;}
  .auth-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;margin-bottom:12px;text-align:center;}
  .auth-input:focus{border-color:var(--gold);}
  .auth-btn{width:100%;background:linear-gradient(135deg,#c9a84c,#e8cc7a);border:none;border-radius:12px;padding:14px;color:#0a0612;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
  .auth-btn:hover{opacity:0.9;}
  .auth-error{font-size:12px;color:rgba(255,100,100,0.8);margin-top:10px;display:none;line-height:1.6;}
  .auth-notice{font-size:11px;color:var(--text-dim);margin-top:16px;line-height:1.8;}
  .auth-notice a{color:var(--gold);text-decoration:none;}

  /* 채팅 화면 */
  .chat-wrap{display:none;position:relative;z-index:1;height:100vh;flex-direction:column;}
  .chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(5,2,14,0.8);backdrop-filter:blur(10px);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#e8cc7a);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-name{font-size:14px;font-weight:500;}
  .header-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .user-info{font-size:12px;color:var(--text-dim);}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 14px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--gold);color:var(--gold);}

  .chat-info-bar{padding:10px 20px;background:rgba(201,168,76,0.05);border-bottom:1px solid rgba(201,168,76,0.1);font-size:11px;color:var(--text-dim);display:flex;gap:16px;flex-wrap:wrap;}
  .info-chip{display:inline-flex;align-items:center;gap:4px;}
  .info-chip span{color:var(--text);}

  .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-track{background:transparent;}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px;}

  .msg{display:flex;gap:10px;max-width:80%;}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.ai{align-self:flex-start;}
  .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .msg.ai .msg-avatar{background:linear-gradient(135deg,rgba(201,168,76,0.3),rgba(45,31,78,0.8));border:1px solid var(--border);}
  .msg.user .msg-avatar{background:rgba(201,168,76,0.2);}
  .msg-bubble{padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.8;}
  .msg.ai .msg-bubble{background:var(--bubble-ai);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg.user .msg-bubble{background:var(--bubble-user);border:1px solid rgba(201,168,76,0.2);border-bottom-right-radius:4px;}
  .msg-time{font-size:10px;color:rgba(155,143,176,0.4);margin-top:4px;text-align:right;}
  .msg.ai .msg-time{text-align:left;}

  .typing{display:flex;gap:4px;padding:14px 16px;align-items:center;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.4;animation:bounce 1.2s ease-in-out infinite;}
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);opacity:0.8;}}

  .chat-input-area{padding:16px 20px;border-top:1px solid var(--border);background:rgba(5,2,14,0.8);backdrop-filter:blur(10px);}
  .suggestions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .suggest-btn{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:20px;padding:6px 14px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .suggest-btn:hover{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold);}
  .input-row{display:flex;gap:10px;}
  .chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none;resize:none;max-height:100px;min-height:44px;}
  .chat-input:focus{border-color:var(--gold);}
  .send-btn{background:linear-gradient(135deg,#c9a84c,#e8cc7a);border:none;border-radius:12px;width:44px;height:44px;color:#0a0612;font-size:18px;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;}
  .send-btn:hover{opacity:0.9;}
  .send-btn:disabled{opacity:0.3;cursor:not-allowed;}

  .credits-bar{font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;}
  .credits-bar span{color:var(--gold);}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:50px;padding:12px 24px;color:var(--gold);font-size:13px;z-index:999;transition:transform 0.3s;backdrop-filter:blur(10px);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    .msg{max-width:92%;}
    .auth-box{padding:32px 24px;}
    .chat-info-bar{gap:10px;}
  }
</style>
</head>
<body>
<div class="nebula"></div>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

<!-- 인증 화면 -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <div class="auth-symbol">✦</div>
    <div class="auth-brand">FORTUNA</div>
    <div class="auth-title">AI 점성 상담</div>
    <div class="auth-sub">리포트 구매 시 사용한 이메일을 입력하면<br>당신의 별자리 데이터로 상담을 시작해요</div>
    <input type="email" class="auth-input" id="emailInput" placeholder="이메일 주소 입력" onkeydown="if(event.key==='Enter')doAuth()">
    <button class="auth-btn" onclick="doAuth()">상담 시작하기 →</button>
    <div class="auth-error" id="authError"></div>
    <div class="auth-notice">
      아직 리포트가 없으신가요?<br>
      <a href="light.html">라이트 리포트</a> 또는 <a href="premium.html">프리미엄 리포트</a>를 먼저 구매해주세요
    </div>
  </div>
</div>

<!-- 채팅 화면 -->
<div class="chat-wrap" id="chatWrap">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-avatar">✦</div>
      <div>
        <div class="header-name">FORTUNA AI</div>
        <div class="header-sub">당신의 별자리 전문 상담사</div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-info" id="userInfoText"></div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="chat-info-bar" id="infoBar"></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div class="suggestions" id="suggestions"></div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="별자리에 대해 무엇이든 물어보세요..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
    <div class="credits-bar">남은 상담 횟수: <span id="creditsLeft">∞</span></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let userData=null;
let chatHistory=[];
let isTyping=false;

// 별 생성
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=Math.random()*2+1;
  s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--op:${0.3+Math.random()*0.7};animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// 이메일 인증
async function doAuth(){
  const email=document.getElementById('emailInput').value.trim();
  const errEl=document.getElementById('authError');
  if(!email){errEl.textContent='이메일을 입력해주세요';errEl.style.display='block';return;}

  errEl.style.display='none';
  const btn=document.querySelector('.auth-btn');
  btn.textContent='확인 중...';btn.disabled=true;

  try{
    // orders 테이블에서 이메일로 조회
    const {data:orders}=await sb.from('orders').select('*').eq('email',email).eq('status','confirmed').order('created_at',{ascending:false}).limit(1);
    
    if(orders&&orders.length>0){
      userData={...orders[0], source:'orders'};
      startChat();
      return;
    }

    // pet_orders 테이블에서도 조회
    const {data:petOrders}=await sb.from('pet_orders').select('*').eq('email',email).eq('status','confirmed').order('id',{ascending:false}).limit(1);
    
    if(petOrders&&petOrders.length>0){
      userData={...petOrders[0], source:'pet_orders'};
      startChat();
      return;
    }

    errEl.innerHTML='해당 이메일로 구매한 리포트가 없어요.<br>리포트 구매 후 이용 가능합니다 🌟';
    errEl.style.display='block';
  }catch(e){
    errEl.textContent='오류가 발생했습니다. 다시 시도해주세요.';
    errEl.style.display='block';
  }finally{
    btn.textContent='상담 시작하기 →';btn.disabled=false;
  }
}

function startChat(){
  document.getElementById('authWrap').style.display='none';
  document.getElementById('chatWrap').style.display='flex';
  
  const o=userData;
  const isPet=o.source==='pet_orders';
  
  // 상단 정보바
  if(isPet){
    document.getElementById('userInfoText').textContent=o.owner_name||o.email;
    document.getElementById('infoBar').innerHTML=`
      <div class="info-chip">🐾 <span>${o.pet_name}</span></div>
      <div class="info-chip">🌟 <span>${o.pet_zodiac}</span></div>
      <div class="info-chip">🔥 <span>${o.pet_ohaeng}오행</span></div>
      <div class="info-chip">🧑 <span>보호자 ${o.owner_zodiac}</span></div>`;
  } else {
    document.getElementById('userInfoText').textContent=o.name||o.email;
    document.getElementById('infoBar').innerHTML=`
      <div class="info-chip">🌟 <span>${getBirthInfo(o)}</span></div>
      <div class="info-chip">📍 <span>${o.birthplace||''}</span></div>
      <div class="info-chip">📋 <span>${o.report_type==='premium'?'프리미엄':'라이트'}</span></div>`;
  }

  // 추천 질문
  const suggests=isPet?[
    `${o.pet_name}의 성격이 궁금해요`,
    `${o.owner_name||'저'}와 궁합은?`,
    '좋아하는 것들이 뭐예요?',
    '오늘의 운세'
  ]:[
    '오늘의 운세 알려줘',
    '나의 연애 운은?',
    '올해 직업 운은?',
    '내 도미넌트 행성은?'
  ];
  document.getElementById('suggestions').innerHTML=suggests.map(s=>`<button class="suggest-btn" onclick="useSuggest('${s}')">${s}</button>`).join('');

  // 웰컴 메시지
  const welcomeMsg=isPet
    ?`안녕하세요! 저는 FORTUNA AI예요 ✦\n\n${o.pet_name}(${o.pet_zodiac}, ${o.pet_ohaeng}오행)에 대해 무엇이든 물어보세요. ${o.pet_name}의 성격, 습관, ${o.owner_name||'보호자'}님과의 관계까지 별자리와 사주로 읽어드릴게요 🐾`
    :`안녕하세요, ${o.name||''}님! 저는 FORTUNA AI예요 ✦\n\n${o.name||''}님의 출생 차트를 바탕으로 무엇이든 물어보세요. 연애, 직업, 오늘의 운세, 성격 분석까지 별자리로 읽어드릴게요 🌟`;

  addMessage('ai', welcomeMsg);
}

function getBirthInfo(o){
  if(o.birthdate_raw) return o.birthdate_raw;
  if(o.year&&o.month&&o.day) return `${o.year}.${String(o.month).padStart(2,'0')}.${String(o.day).padStart(2,'0')}`;
  return '';
}

function addMessage(role, text){
  const messages=document.getElementById('chatMessages');
  const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`
    <div class="msg-avatar">${role==='ai'?'✦':'👤'}</div>
    <div>
      <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${now}</div>
    </div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
  chatHistory.push({role:role==='ai'?'assistant':'user', content:text});
}

function showTyping(){
  const messages=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typingMsg';
  div.innerHTML=`<div class="msg-avatar">✦</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function hideTyping(){
  const t=document.getElementById('typingMsg');
  if(t)t.remove();
}

function useSuggest(text){
  document.getElementById('chatInput').value=text;
  sendMessage();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

async function sendMessage(){
  if(isTyping)return;
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addMessage('user',text);
  isTyping=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();

  try{
    const o=userData;
    const isPet=o.source==='pet_orders';
    
    const systemPrompt=isPet
      ?`당신은 FORTUNA AI, 반려동물 별자리 & 사주 전문 상담사입니다.
아래는 상담 중인 반려동물 정보입니다:
- 이름: ${o.pet_name}
- 종류: ${o.report_type==='dog'?'강아지':'고양이'} (${o.pet_breed||'미상'})
- 성별: ${o.pet_gender}
- 생년월일: ${o.pet_birthdate_raw}
- 별자리: ${o.pet_zodiac}
- 사주 오행: ${o.pet_ohaeng}
- 보호자: ${o.owner_name} (${o.owner_zodiac}자리)

따뜻하고 친근한 말투로, 보호자가 반려동물을 더 잘 이해할 수 있게 도와주세요. 이모지를 적절히 사용하고 2-4문단으로 답변해주세요.`
      :`당신은 FORTUNA AI, 서양 점성술 전문 상담사입니다.
아래는 상담 중인 고객 정보입니다:
- 이름: ${o.name}
- 생년월일: ${o.birthdate_raw||`${o.year}.${o.month}.${o.day}`} (${o.calendar||'양력'})
- 출생시간: ${o.hour}시 ${o.min}분
- 출생지: ${o.birthplace||''} (${o.place_en||''})
- 리포트: ${o.report_type==='premium'?'프리미엄':'라이트'}
${o.planets_json?`- 행성 데이터: ${o.planets_json}`:''}

따뜻하고 통찰력 있는 말투로 답변해주세요. 이모지를 적절히 사용하고 2-4문단으로 답변해주세요.`;

    const messages=[
      ...chatHistory.slice(-10).map(m=>({role:m.role,content:m.content})),
      {role:'user',content:text}
    ];

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:800,
        system:systemPrompt,
        messages
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'죄송해요, 잠시 후 다시 시도해주세요.';
    hideTyping();
    addMessage('ai',reply);
  }catch(e){
    hideTyping();
    addMessage('ai','죄송해요, 잠시 오류가 발생했어요. 다시 시도해주세요 🙏');
  }finally{
    isTyping=false;
    document.getElementById('sendBtn').disabled=false;
  }
}

function doLogout(){
  userData=null;chatHistory=[];
  document.getElementById('chatWrap').style.display='none';
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('emailInput').value='';
  document.getElementById('chatMessages').innerHTML='';
}
</script>
</body>
</html>
