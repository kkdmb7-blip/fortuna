<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTUNA — AI 점성 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4ede0;--gold:#8a6a15;--gold-light:#b89048;
    --text:#1a120a;--text-dim:#5a4830;--border:rgba(154,122,38,0.3);
    --bubble-user:rgba(154,122,38,0.18);--bubble-ai:rgba(28,28,40,0.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow:hidden;}
  .auth-wrap{position:relative;z-index:1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
  .auth-symbol{font-size:32px;margin-bottom:16px;}
  .auth-brand{font-size:11px;letter-spacing:0.5em;color:var(--gold);margin-bottom:8px;}
  .auth-title{font-size:24px;font-weight:300;margin-bottom:8px;}
  .auth-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px;line-height:1.6;}
  .auth-input{width:100%;background:#fff;border:1px solid rgba(154,122,38,0.3);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;margin-bottom:12px;text-align:center;}
  .auth-input:focus{border-color:var(--gold);}
  .auth-btn{width:100%;background:rgba(184,144,72,0.18);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
  .auth-btn:hover{opacity:0.9;}
  .auth-error{font-size:12px;color:rgba(255,100,100,0.8);margin-top:10px;display:none;line-height:1.6;}
  .auth-notice{font-size:11px;color:var(--text-dim);margin-top:16px;line-height:1.8;}
  .auth-notice a{color:var(--gold);text-decoration:none;}
  .chat-wrap{display:none;position:relative;z-index:1;height:100vh;flex-direction:column;}
  .chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,0.8);backdrop-filter:blur(10px);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-avatar{width:36px;height:36px;border-radius:50%;background:rgba(184,144,72,0.18);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-name{font-size:14px;font-weight:500;}
  .header-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .user-info{font-size:12px;color:var(--text-dim);}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:6px 14px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--gold);color:var(--gold);}
  .chat-info-bar{padding:10px 20px;background:rgba(154,122,38,0.08);border-bottom:1px solid rgba(154,122,38,0.15);font-size:11px;color:var(--text-dim);display:flex;gap:16px;flex-wrap:wrap;}
  .info-chip{display:inline-flex;align-items:center;gap:4px;}
  .info-chip span{color:var(--text);}
  .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-track{background:transparent;}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(154,122,38,0.3);border-radius:2px;}
  .msg{display:flex;gap:10px;max-width:80%;}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.ai{align-self:flex-start;}
  .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .msg.ai .msg-avatar{background:linear-gradient(135deg,rgba(154,122,38,0.4),rgba(28,28,40,0.8));border:1px solid var(--border);}
  .msg.user .msg-avatar{background:rgba(154,122,38,0.3);}
  .msg-bubble{padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.8;}
  .msg.ai .msg-bubble{background:var(--bubble-ai);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg.user .msg-bubble{background:var(--bubble-user);border:1px solid rgba(154,122,38,0.3);border-bottom-right-radius:4px;}
  .msg-time{font-size:10px;color:rgba(155,143,176,0.4);margin-top:4px;text-align:right;}
  .msg.ai .msg-time{text-align:left;}
  .typing{display:flex;gap:4px;padding:14px 16px;align-items:center;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.4;animation:bounce 1.2s ease-in-out infinite;}
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);opacity:0.8;}}
  .chat-input-area{padding:16px 20px;border-top:1px solid var(--border);background:rgba(10,10,15,0.8);backdrop-filter:blur(10px);}
  .suggestions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .suggest-btn{background:rgba(154,122,38,0.1);border:1px solid rgba(154,122,38,0.2);border-radius:16px;padding:6px 14px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .suggest-btn:hover{background:rgba(154,122,38,0.18);border-color:var(--gold);color:var(--gold);}
  .input-row{display:flex;gap:10px;}
  .chat-input{flex:1;background:#fff;border:1px solid rgba(154,122,38,0.3);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;resize:none;max-height:100px;min-height:44px;}
  .chat-input:focus{border-color:var(--gold);}
  .send-btn{background:rgba(184,144,72,0.18);border:none;border-radius:12px;width:44px;height:44px;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;}
  .send-btn:hover{opacity:0.9;}
  .send-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .credits-bar{font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;}
  .credits-bar span{color:var(--gold);}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(154,122,38,0.2);border:1px solid var(--gold);border-radius:50px;padding:12px 24px;color:var(--gold);font-size:13px;z-index:999;transition:transform 0.3s;backdrop-filter:blur(10px);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:600px){.msg{max-width:92%;}.auth-box{padding:32px 24px;}.chat-info-bar{gap:10px;}}
</style>
</head>
<body>
<div class="nebula"></div>

<div class="toast" id="toast"></div>
<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <div class="auth-symbol">✦</div>
    <div class="auth-brand">FORTUNA</div>
    <div class="auth-title">AI 점성 상담</div>
    <div class="auth-sub">리포트 구매 시 사용한 이메일을 입력하면<br>당신의 별자리 데이터로 상담을 시작해요</div>
    <input type="email" class="auth-input" id="emailInput" placeholder="이메일 주소 입력" onkeydown="if(event.key==='Enter')doAuth()">
    <button class="auth-btn" onclick="doAuth()">상담 시작하기 →</button>
    <div class="auth-error" id="authError"></div>
    <div class="auth-notice">아직 리포트가 없으신가요?<br><a href="light.html">라이트 리포트</a> 또는 <a href="premium.html">프리미엄 리포트</a>를 먼저 구매해주세요</div>
  </div>
</div>
<div class="chat-wrap" id="chatWrap">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-avatar">✦</div>
      <div>
        <div class="header-name">FORTUNA AI</div>
        <div class="header-sub">당신의 별자리 전문 상담사</div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-info" id="userInfoText"></div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="chat-info-bar" id="infoBar"></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div class="suggestions" id="suggestions"></div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="별자리에 대해 무엇이든 물어보세요..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
    <div class="credits-bar">남은 상담 횟수: <span id="creditsLeft">∞</span></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const MAKE_WEBHOOK='https://hook.us2.make.com/xt64drmpaqux3x58ddbdi0ja9ehifbgh';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let userData=null;
let chatHistory=[];
let isTyping=false;



function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

async function doAuth(){
  const email=document.getElementById('emailInput').value.trim();
  const errEl=document.getElementById('authError');
  if(!email){errEl.textContent='이메일을 입력해주세요';errEl.style.display='block';return;}
  errEl.style.display='none';
  const btn=document.querySelector('.auth-btn');
  btn.textContent='확인 중...';btn.disabled=true;
  try{
    const {data:orders}=await sb.from('orders').select('*').eq('email',email).eq('status','confirmed').order('created_at',{ascending:false}).limit(1);
    if(orders&&orders.length>0){userData={...orders[0],source:'orders'};startChat();return;}
    const {data:petOrders}=await sb.from('pet_orders').select('*').eq('email',email).eq('status','confirmed').order('id',{ascending:false}).limit(1);
    if(petOrders&&petOrders.length>0){userData={...petOrders[0],source:'pet_orders'};startChat();return;}
    errEl.innerHTML='해당 이메일로 구매한 리포트가 없어요.<br>리포트 구매 후 이용 가능합니다 🌟';
    errEl.style.display='block';
  }catch(e){
    errEl.textContent='오류가 발생했습니다. 다시 시도해주세요.';
    errEl.style.display='block';
  }finally{
    btn.textContent='상담 시작하기 →';btn.disabled=false;
  }
}

function startChat(){
  document.getElementById('authWrap').style.display='none';
  document.getElementById('chatWrap').style.display='flex';
  const today=new Date().toDateString();
  const key=`consult_count_${today}_${userData.email}`;
  const used=parseInt(localStorage.getItem(key)||'0');
  document.getElementById('creditsLeft').textContent=10-used;
  const o=userData;
  const isPet=o.source==='pet_orders';
  if(isPet){
    document.getElementById('userInfoText').textContent=o.owner_name||o.email;
    document.getElementById('infoBar').innerHTML=`<div class="info-chip">🐾 <span>${o.pet_name}</span></div><div class="info-chip">🌟 <span>${o.pet_zodiac}</span></div><div class="info-chip">🔥 <span>${o.pet_ohaeng}오행</span></div><div class="info-chip">🧑 <span>보호자 ${o.owner_zodiac}</span></div>`;
  }else{
    document.getElementById('userInfoText').textContent=o.name||o.email;
    document.getElementById('infoBar').innerHTML=`<div class="info-chip">🌟 <span>${getBirthInfo(o)}</span></div><div class="info-chip">📍 <span>${o.birthplace||''}</span></div><div class="info-chip">📋 <span>${o.report_type==='premium'?'프리미엄':'라이트'}</span></div>`;
  }
  const suggests=isPet?[`${o.pet_name}의 성격이 궁금해요`,`${o.owner_name||'저'}와 궁합은?`,'좋아하는 것들이 뭐예요?','오늘의 운세']:['오늘의 운세 알려줘','나의 연애 운은?','올해 직업 운은?','내 도미넌트 행성은?'];
  document.getElementById('suggestions').innerHTML=suggests.map(s=>`<button class="suggest-btn" onclick="useSuggest('${s}')">${s}</button>`).join('');
  const welcomeMsg=isPet
    ?`안녕하세요! 저는 FORTUNA AI예요 ✦\n\n${o.pet_name}(${o.pet_zodiac}, ${o.pet_ohaeng}오행)에 대해 무엇이든 물어보세요 🐾`
    :`안녕하세요, ${o.name||''}님! 저는 FORTUNA AI예요 ✦\n\n${o.name||''}님의 출생 차트를 바탕으로 무엇이든 물어보세요 🌟`;
  addMessage('ai',welcomeMsg);
}

function getBirthInfo(o){
  if(o.birthdate_raw)return o.birthdate_raw;
  if(o.year&&o.month&&o.day)return `${o.year}.${String(o.month).padStart(2,'0')}.${String(o.day).padStart(2,'0')}`;
  return '';
}

function addMessage(role,text){
  const messages=document.getElementById('chatMessages');
  const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`<div class="msg-avatar">${role==='ai'?'✦':'👤'}</div><div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${now}</div></div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
  if(role!=='ai'||chatHistory.length>0){
    chatHistory.push({role:role==='ai'?'assistant':'user',content:text});
  }
}

function showTyping(){
  const messages=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typingMsg';
  div.innerHTML=`<div class="msg-avatar">✦</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function hideTyping(){const t=document.getElementById('typingMsg');if(t)t.remove();}
function useSuggest(text){document.getElementById('chatInput').value=text;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

async function sendMessage(){
  if(isTyping)return;
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  const today=new Date().toDateString();
  const key=`consult_count_${today}_${userData.email}`;
  const count=parseInt(localStorage.getItem(key)||'0');
  if(count>=10){showToast('오늘 상담 횟수(10회)를 모두 사용했어요 🌙 내일 다시 이용해주세요!');return;}
  input.value='';
  addMessage('user',text);
  isTyping=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();
  try{
    const o=userData;
    const isPet=o.source==='pet_orders';
    // system_prompt를 한 줄로 만들어서 JSON 오류 방지
    const systemPrompt=isPet
      ?`당신은 FORTUNA AI, 반려동물 별자리 & 사주 전문 상담사입니다. 반려동물 정보: 이름 ${o.pet_name}, 종류 ${o.report_type==='dog'?'강아지':'고양이'}(${o.pet_breed||'미상'}), 성별 ${o.pet_gender}, 생년월일 ${o.pet_birthdate_raw}, 별자리 ${o.pet_zodiac}, 오행 ${o.pet_ohaeng}, 보호자 ${o.owner_name}(${o.owner_zodiac}자리). 따뜻하고 친근한 말투로 답변해주세요. 이모지를 적절히 사용하고 2-4문단으로 답변해주세요.`
      :`당신은 FORTUNA AI, 서양 점성술 전문 상담사입니다. 고객 정보: 이름 ${o.name}, 생년월일 ${o.birthdate_raw||`${o.year}.${o.month}.${o.day}`}(${o.calendar||'양력'}), 출생시간 ${o.hour}시 ${o.min}분, 출생지 ${o.birthplace||''}(${o.place_en||''}), 리포트 ${o.report_type==='premium'?'프리미엄':'라이트'}${o.planets_json?`, 행성데이터 ${o.planets_json}`:``}. 따뜻하고 통찰력 있는 말투로 답변해주세요. 이모지를 적절히 사용하고 2-4문단으로 답변해주세요.`;

    const res=await fetch(MAKE_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system_prompt:systemPrompt, question:text})
    });
    if(!res.ok)throw new Error('webhook error '+res.status);
    const reply=await res.text();
    localStorage.setItem(key,count+1);
    document.getElementById('creditsLeft').textContent=10-(count+1);
    hideTyping();
    addMessage('ai',reply||'죄송해요, 잠시 후 다시 시도해주세요.');
  }catch(e){
    hideTyping();
    addMessage('ai','죄송해요, 잠시 오류가 발생했어요. 다시 시도해주세요 🙏');
  }finally{
    isTyping=false;
    document.getElementById('sendBtn').disabled=false;
  }
}

function doLogout(){
  userData=null;chatHistory=[];isTyping=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('chatWrap').style.display='none';
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('emailInput').value='';
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('suggestions').innerHTML='';
  const typingMsg=document.getElementById('typingMsg');if(typingMsg)typingMsg.remove();
}
</script>
</body>
</html>
