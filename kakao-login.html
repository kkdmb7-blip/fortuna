<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카카오 로그인</title>
</head>

<body style="background:#05020e;color:white;text-align:center;padding-top:120px;font-family:sans-serif;">

<h2>FORTUNA 카카오 로그인</h2>

<button id="kakaoLogin" style="padding:14px 28px;font-size:16px;background:#FEE500;border:none;border-radius:10px;">
카카오로 로그인
</button>

<script>
const REST_API_KEY = "51b4f87ad9cfd6312c176ad34eb62025";
const REDIRECT_URI = "https://fortuna-silk.vercel.app/kakao-callback.html";

document.getElementById("kakaoLogin").onclick = function(){

const url =
`https://kauth.kakao.com/oauth/authorize?client_id=${REST_API_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code`;

window.location.href = url;

};
</script>

</body>
</html>
