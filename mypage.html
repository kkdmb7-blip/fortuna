<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTUNA — 마이페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4ede0;--surface:#fdf8eb;--surface2:#f9efd5;--gold:#8a6a15;--gold-deep:#6a4f0c;--gold-light:#b89048;--text:#1a120a;--text-dim:#5a4830;--muted:#7a6840;--border:rgba(154,122,38,0.32);--border-soft:rgba(154,122,38,0.18);--font-display:'Noto Serif KR',serif;--font-sans:'Noto Sans KR',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
  .container{max-width:560px;margin:0 auto;padding:40px 24px 80px;}
  .header{text-align:center;margin-bottom:32px;}
  .brand{font-family:var(--font-display);font-size:12px;letter-spacing:0.58em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
  .title{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:8px;}
  .subtitle{font-size:13px;color:var(--muted);line-height:1.7;}
  .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto;}
  .lookup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;margin-bottom:18px;}
  .lookup-card label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;letter-spacing:0.04em;}
  .lookup-card input{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;}
  .lookup-card input:focus{border-color:var(--gold);}
  .lookup-card button{width:100%;margin-top:10px;background:var(--gold);color:#fdf7e0;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;letter-spacing:0.04em;cursor:pointer;font-family:var(--font-display);}
  .lookup-card button:hover{background:var(--gold-deep);}
  .order-list{display:flex;flex-direction:column;gap:12px;}
  .order-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;}
  .order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .order-type{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);}
  .order-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:0.04em;white-space:nowrap;}
  .status-paid{background:rgba(58,138,90,0.15);color:#2d6a3a;border:1px solid rgba(58,138,90,0.3);}
  .status-pending{background:rgba(184,144,72,0.15);color:var(--gold-deep);border:1px solid rgba(184,144,72,0.35);}
  .status-bank{background:rgba(123,94,167,0.15);color:#5a3f87;border:1px solid rgba(123,94,167,0.3);}
  .status-completed{background:rgba(46,107,168,0.15);color:#2e6ba8;border:1px solid rgba(46,107,168,0.3);}
  .order-meta{font-size:11.5px;color:var(--muted);line-height:1.7;}
  .order-meta strong{color:var(--text);font-weight:600;}
  .order-actions{display:flex;gap:8px;margin-top:12px;}
  .btn-action{flex:1;background:rgba(154,122,38,0.10);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;font-weight:600;color:var(--gold-deep);cursor:pointer;text-decoration:none;text-align:center;font-family:var(--font-display);}
  .btn-action.primary{background:var(--gold);color:#fdf7e0;border-color:var(--gold-deep);}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:2;}
  .empty .empty-ico{font-size:36px;margin-bottom:14px;opacity:0.5;}
  .home-btn{display:block;text-align:center;margin-top:24px;font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:0.06em;padding:10px;}
  .home-btn:hover{color:var(--gold);}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(154,122,38,0.92);border:1px solid var(--gold);border-radius:50px;padding:11px 22px;color:#fdf7e0;font-size:13px;letter-spacing:0.04em;z-index:999;transition:transform 0.3s ease;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(154,122,38,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
</script>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="container">
  <div class="header">
    <div class="brand">FORTUNA</div>
    <div class="divider"></div>
    <h1 class="title">내 주문 내역</h1>
    <p class="subtitle">결제하신 이메일을 입력하면<br>주문 상태를 확인하실 수 있어요.</p>
  </div>

  <div class="lookup-card" id="lookupCard">
    <label>주문 시 입력한 이메일</label>
    <input type="email" id="lookupEmail" placeholder="example@email.com" autocomplete="email">
    <button onclick="lookupOrders()">주문 조회하기</button>
  </div>

  <div id="orderArea"></div>

  <a href="index.html" class="home-btn">← 메인으로 돌아가기</a>
</div>

<script>
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

const TYPE_LABEL={
  light:'점성 라이트 리포트',
  premium:'점성 프리미엄 리포트',
  saju:'사주 리포트',
  saju_premium:'사주+점성 통합 리포트',
};

const TYPE_AMOUNT={
  light:9900, premium:29000, saju:29000, saju_premium:39000,
};

function statusBadge(s){
  if(s==='paid')return ['결제 완료','status-paid'];
  if(s==='completed'||s==='sent')return ['리포트 발송 완료','status-completed'];
  if(s==='bank_transfer_pending')return ['입금 확인 대기','status-bank'];
  if(s==='pending')return ['결제 진행 중','status-pending'];
  return [s||'상태 미상','status-pending'];
}

function fmtDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  if(isNaN(d.getTime()))return '';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderOrders(orders){
  const area=document.getElementById('orderArea');
  if(!orders||orders.length===0){
    area.innerHTML=`
      <div class="empty">
        <div class="empty-ico">✦</div>
        주문 내역이 없습니다<br>
        <span style="font-size:12px;color:rgba(122,104,64,0.7);">이메일을 다시 확인해 주세요</span>
      </div>
    `;
    return;
  }
  area.innerHTML='<div class="order-list">'+orders.map(o=>{
    const [statusText,statusCls]=statusBadge(o.status);
    const typeLabel=TYPE_LABEL[o.report_type]||o.report_type||'리포트';
    const amount=o.payment_amount||TYPE_AMOUNT[o.report_type]||0;
    return `
      <div class="order-card">
        <div class="order-head">
          <div class="order-type">${typeLabel}</div>
          <div class="order-status ${statusCls}">${statusText}</div>
        </div>
        <div class="order-meta">
          주문번호: <strong>${o.order_id||'-'}</strong><br>
          신청자: <strong>${o.name||'-'}</strong> · ${amount?amount.toLocaleString()+'원':'-'}<br>
          신청일: ${fmtDate(o.created_at||o.confirmed_at)}
        </div>
        ${o.status==='bank_transfer_pending'?`
          <div class="order-actions">
            <div style="flex:1;font-size:11.5px;color:var(--muted);line-height:1.7;padding:8px 4px;">국민은행 013-21-0780-866<br>예금주 오주영 · ${amount?amount.toLocaleString():'9,900'}원 입금</div>
          </div>
        `:''}
        ${(o.status==='completed'||o.status==='sent')?`
          <div class="order-actions">
            <div style="flex:1;font-size:11.5px;color:var(--muted);line-height:1.7;padding:8px 4px;">📧 ${o.email||'이메일'}로 발송 완료. 스팸함도 확인해 주세요.</div>
          </div>
        `:''}
      </div>
    `;
  }).join('')+'</div>';
}

async function lookupOrders(){
  const email=document.getElementById('lookupEmail').value.trim().toLowerCase();
  if(!email||!email.includes('@')){showToast('이메일을 정확히 입력해주세요');return;}
  try{ localStorage.setItem('fortuna_order_email', email); }catch(e){}
  const area=document.getElementById('orderArea');
  area.innerHTML='<div class="loading"><div class="spinner"></div><br>주문 조회 중...</div>';
  try{
    const {data,error}=await sb.from('orders').select('*').eq('email',email).order('created_at',{ascending:false}).limit(20);
    if(error)throw error;
    renderOrders(data||[]);
  }catch(e){
    console.error(e);
    area.innerHTML='<div class="empty"><div class="empty-ico">⚠</div>조회 중 오류가 발생했습니다<br><span style="font-size:12px;">잠시 후 다시 시도해 주세요</span></div>';
  }
}

// 자동 조회: localStorage 또는 직전 주문에서 이메일 복구
(function autoLookup(){
  let savedEmail=null;
  try{ savedEmail=localStorage.getItem('fortuna_order_email'); }catch(e){}
  if(!savedEmail){
    try{
      const last=localStorage.getItem('fortuna_last_order');
      if(last){const o=JSON.parse(last); if(o.email)savedEmail=o.email;}
    }catch(e){}
  }
  if(savedEmail){
    document.getElementById('lookupEmail').value=savedEmail;
    lookupOrders();
  }
})();
</script>
</body>
</html>
