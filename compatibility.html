<style>
  :root{--bg:#0a0a0f;--gold:#d4af37;--gold-light:#e8cc7a;--text:#ede6f8;--text-dim:#8b8ba8;--border:rgba(212,175,55,0.2);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  
  
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.08);}

  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(10,6,18,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
  .result{background:linear-gradient(135deg,rgba(28,28,40,0.5),rgba(10,6,18,0.7));border:1px solid var(--gold);border-radius:16px;padding:40px 32px;margin-top:24px;animation:fadeUp 0.6s ease;display:none;}
  .score-circle{width:140px;height:140px;border-radius:50%;border:3px solid var(--gold);display:flex;flex-direction:column;justify-content:center;align-items:center;margin:0 auto 20px;background:rgba(212,175,55,0.05);}
  .score-num{font-size:48px;font-weight:300;color:var(--gold);line-height:1;}

  .signs-row{font-size:13px;letter-spacing:0.15em;color:var(--text-dim);text-align:center;margin-bottom:24px;}

  .upsell{border-top:1px solid var(--border);padding-top:28px;margin-top:24px;text-align:center;}

  .upsell-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,175,55,0.4);}

  @media(max-width:500px){.two-col{gap:10px;} .input{padding:10px 12px;font-size:13px;}}
</style>

<script>
const CITIES={
  '강릉':{lat:37.7519,lon:128.8761},'거제':{lat:34.8803,lon:128.6219},
  '경주':{lat:35.8562,lon:129.2247},'고양':{lat:37.6584,lon:126.8320},
  '광명':{lat:37.4789,lon:126.8643},'광주':{lat:35.1595,lon:126.8526},
  '구미':{lat:36.1196,lon:128.3446},'군산':{lat:35.9675,lon:126.7368},
  '김해':{lat:35.2341,lon:128.8893},'남양주':{lat:37.6359,lon:127.2168},
  '대구':{lat:35.8714,lon:128.6014},'대전':{lat:36.3504,lon:127.3845},
  '목포':{lat:34.8118,lon:126.3922},'부산':{lat:35.1796,lon:129.0756},
  '부천':{lat:37.5034,lon:126.7660},'사천':{lat:35.0035,lon:128.0645},
  '서울':{lat:37.5665,lon:126.9780},'성남':{lat:37.4386,lon:127.1378},

  '시흥':{lat:37.3797,lon:126.8031},'아산':{lat:36.7897,lon:127.0023},
  '안산':{lat:37.3219,lon:126.8309},'안성':{lat:37.0078,lon:127.2797},
  '안양':{lat:37.3943,lon:126.9568},'양산':{lat:35.3350,lon:129.0371},
  '여수':{lat:34.7604,lon:127.6622},'오산':{lat:37.1498,lon:127.0774},
  '용인':{lat:37.2411,lon:127.1775},'원주':{lat:37.3420,lon:127.9202},
  '의정부':{lat:37.7381,lon:127.0472},'이천':{lat:37.2721,lon:127.4350},
  '인천':{lat:37.4563,lon:126.7052},'전주':{lat:35.8242,lon:127.1480},
  '제주':{lat:33.4996,lon:126.5312},'진주':{lat:35.1799,lon:128.1076},
  '창원':{lat:35.2280,lon:128.6811},'천안':{lat:36.8151,lon:127.1139},
  '청주':{lat:36.6424,lon:127.4890},'춘천':{lat:37.8813,lon:127.7298},
  '통영':{lat:34.8544,lon:128.4330},'평택':{lat:36.9921,lon:127.1128},
  '포항':{lat:36.0190,lon:129.3435},'하남':{lat:37.5392,lon:127.2148},
  '화성':{lat:37.1996,lon:126.8317},'울산':{lat:35.5384,lon:129.3114},
};

const SIGN_NAMES=['양자리','황소자리','쌍둥이자리','게자리','사자자리','처녀자리','천칭자리','전갈자리','사수자리','염소자리','물병자리','물고기자리'];
const PLANET_KR={Sun:'태양',Moon:'달',Venus:'금성',Mars:'화성'};

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function parseBirthdate(str){
  const clean=str.replace(/[^0-9]/g,'');
  if(clean.length===8){
    const y=parseInt(clean.slice(0,4)),m=parseInt(clean.slice(4,6)),d=parseInt(clean.slice(6,8));
    if(y<1900||y>new Date().getFullYear()||m<1||m>12||d<1||d>31)return null;
    return{year:y,month:m,day:d};
  }
  const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);
  if(p.length<3)return null;
  const y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  if(y<1900||y>new Date().getFullYear()||m<1||m>12||d<1||d>31)return null;
  return{year:y,month:m,day:d};
}

function parseTime(str){
  if(!str||!str.trim())return{hour:12,min:0};
  const clean=str.replace(/[^0-9]/g,'');
  let h,m;
  if(clean.length===3){h=parseInt(clean.slice(0,1));m=parseInt(clean.slice(1));}
  else if(clean.length===4){h=parseInt(clean.slice(0,2));m=parseInt(clean.slice(2));}
  else{const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);h=parseInt(p[0])||12;m=parseInt(p[1])||0;}
  if(h<0||h>23||m<0||m>59)return{hour:12,min:0};
  return{hour:h,min:m};
}

function getAspect(angle){
  const list=[
    {name:'합',a:0,orb:8,score:15,good:true,desc:'강한 연결'},
    {name:'삼각',a:120,orb:8,score:12,good:true,desc:'자연스러운 조화'},
    {name:'육각',a:60,orb:6,score:8,good:true,desc:'부드러운 시너지'},
    {name:'대립',a:180,orb:8,score:4,good:true,desc:'강렬한 끌림'},
    {name:'사각',a:90,orb:6,score:-4,good:false,desc:'마찰과 성장'},
    {name:'퀸컹스',a:150,orb:3,score:-2,good:false,desc:'조율이 필요한 관계'},
  ];
  for(const asp of list){if(Math.abs(angle-asp.a)<=asp.orb)return asp;}
  return null;
}

async function fetchPlanets(bd,bt,city){
  const res=await fetch('https://fortuna.kkdmb7.workers.dev/astro',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({day:bd.day,month:bd.month,year:bd.year,hour:bt.hour,min:bt.min,lat:city.lat,lon:city.lon,tzone:9.0})
  });
  const data=await res.json();
  return data.output||data;
}

async function calcCompatibility(){
  const bdA=parseBirthdate(document.getElementById('birthA').value);
  const bdB=parseBirthdate(document.getElementById('birthB').value);
  const pA=document.getElementById('placeA').value;
  const pB=document.getElementById('placeB').value;
  if(!bdA||!bdB){showToast('두 사람의 생년월일을 올바르게 입력해주세요');return;}
  if(!pA||!pB){showToast('두 사람의 지역을 선택해주세요');return;}
  const cityA=CITIES[pA],cityB=CITIES[pB];
  const btA=parseTime(document.getElementById('timeA').value);
  const btB=parseTime(document.getElementById('timeB').value);
  const btn=document.getElementById('calcBtn');
  btn.disabled=true;btn.innerHTML='<span class="loading"></span>두 차트 분석 중...';
  try{
    const [pAdata,pBdata]=await Promise.all([fetchPlanets(bdA,btA,cityA),fetchPlanets(bdB,btB,cityB)]);
    // 행성별 가중치: 개인 행성일수록 높게
    const KEY_WEIGHTS={Sun:2.0,Moon:2.0,Venus:1.8,Mars:1.6,Mercury:1.2,Ascendant:1.5};
    const KEY=Object.keys(KEY_WEIGHTS);
    let total=0;const aspects=[];
    let maxPossible=0,minPossible=0;
    KEY.forEach(kA=>{
      const wA=KEY_WEIGHTS[kA]||1;
      KEY.forEach(kB=>{
        const wB=KEY_WEIGHTS[kB]||1;
        const w=wA*wB;
        maxPossible+=15*w;
        minPossible+=(-4)*w;
      });
    });
    KEY.forEach(kA=>{
      const a=pAdata.find(p=>p.name===kA)||(kA==='Ascendant'?pAdata.find(p=>p.name==='Ascendant'):null);
      const wA=KEY_WEIGHTS[kA]||1;
      KEY.forEach(kB=>{
        const b=pBdata.find(p=>p.name===kB)||(kB==='Ascendant'?pBdata.find(p=>p.name==='Ascendant'):null);
        if(!a||!b)return;
        const wB=KEY_WEIGHTS[kB]||1;
        const diff=Math.abs(a.fullDegree-b.fullDegree);
        const angle=diff>180?360-diff:diff;
        const asp=getAspect(angle);
        if(asp){total+=asp.score*wA*wB;aspects.push({kA,kB,asp});}
      });
    });
    const score=Math.max(10,Math.min(99,Math.round(((total-minPossible)/(maxPossible-minPossible))*89+10)));
    let title,subtitle,color;
    if(score>=80){title='강한 연결';subtitle='두 사람의 에너지가 자연스럽게 맞닿아 있어요. 함께 있을 때 편안하면서도 서로를 성장시키는 조합이에요.';color='#88cc88';}
    else if(score>=65){title='좋은 궁합';subtitle='대체로 잘 맞는 에너지예요. 서로 다른 점이 있어도 그게 오히려 균형을 만들어줍니다.';color='var(--gold)';}
    else if(score>=45){title='보통 궁합';subtitle='맞는 부분도, 긴장되는 부분도 함께 있어요. 서로를 이해하려는 노력이 관계를 더 깊게 만들어요.';color='#e8cc7a';}
    else{title='도전적인 궁합';subtitle='에너지의 충돌이 많지만, 이런 관계가 오히려 서로를 가장 크게 성장시키기도 해요.';color='#cc8888';}
    const sunA=pAdata.find(p=>p.name==='Sun');
    const sunB=pBdata.find(p=>p.name==='Sun');
    const signA=sunA?SIGN_NAMES[Math.floor(((sunA.fullDegree%360)+360)%360/30)]:'';
    const signB=sunB?SIGN_NAMES[Math.floor(((sunB.fullDegree%360)+360)%360/30)]:'';
    document.getElementById('scoreWrap').innerHTML=`
      <div class="signs-row">${signA} × ${signB}</div>
      <div class="score-circle" style="border-color:${color}">
        <div class="score-num" style="color:${color}">${score}</div>
        <div class="score-label">/ 100</div>
      </div>
      <div class="score-title" style="color:${color}">${title}</div>
      <div class="score-subtitle">${subtitle}</div>`;
    const good=aspects.filter(r=>r.asp.good).slice(0,4);
    const tense=aspects.filter(r=>!r.asp.good).slice(0,3);
    let html='';
    if(good.length){
      html+=`<div class="aspect-section"><span class="aspect-label">✦ 잘 맞는 에너지</span>`;
      good.forEach(r=>{html+=`<div class="aspect-item"><span>${PLANET_KR[r.kA]} × ${PLANET_KR[r.kB]}</span><span class="aspect-good">${r.asp.name} · ${r.asp.desc}</span></div>`;});
      html+=`</div>`;
    }
    if(tense.length){
      html+=`<div class="aspect-section" style="margin-top:16px"><span class="aspect-label">⚡ 긴장되는 에너지</span>`;
      tense.forEach(r=>{html+=`<div class="aspect-item"><span>${PLANET_KR[r.kA]} × ${PLANET_KR[r.kB]}</span><span class="aspect-tense">${r.asp.name} · ${r.asp.desc}</span></div>`;});
      html+=`</div>`;
    }
    if(!html)html='<p style="color:var(--text-dim);font-size:13px;text-align:center;">뚜렷한 어스펙트가 없어요. 두 사람이 서로에게 자유로운 관계예요.</p>';
    document.getElementById('aspectWrap').innerHTML=html;
    document.getElementById('result').style.display='block';
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){
    showToast('오류가 발생했어요. 다시 시도해주세요');console.error(e);
  }
  btn.disabled=false;btn.textContent='✦ 궁합 점수 확인하기';
}


</script>
</body>
</html>
