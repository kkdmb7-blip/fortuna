const PLANET_ICON={Jupiter:'🪐',Mars:'🔴',Saturn:'🪐',Venus:'💫',Mercury:'⚡'};
const PLANET_COLOR={Jupiter:'#b482ff',Mars:'#ff6b6b',Saturn:'#c9a84c',Venus:'#ff9eb5',Mercury:'#7ecbff'};

// URL 파라미터에서 일주 가져오기
const params=new URLSearchParams(location.search);
let pillar=params.get('pillar')||'갑인';
let orderId=params.get('order')||null;

async function init(){
  const data=PILLAR_PLANET[pillar];
  if(!data){document.getElementById('hookCard').innerHTML='<p style="color:var(--dim)">일주 정보를 찾을 수 없습니다.</p>';return;}

  // DB에서 실제 통계 가져오기 (100건 이상이면 실제값 사용)
  let displayPct=data.primary_pct;
  let displayPct2=data.secondary_pct;
  let isRealData=false;
  let totalCount=0;

  try{
    const {data:stats}=await sb.from('pillar_planet_stats')
      .select('dominant_planet_kor, dominant_planet')
      .eq('day_pillar',pillar);
    
    if(stats && stats.length>=100){
      isRealData=true;
      totalCount=stats.length;
      const counts={};
      stats.forEach(r=>{counts[r.dominant_planet_kor]=(counts[r.dominant_planet_kor]||0)+1;});
      displayPct=Math.round((counts[data.primary_kor]||0)*100/totalCount);
      if(data.secondary_kor) displayPct2=Math.round((counts[data.secondary_kor]||0)*100/totalCount);
    } else if(stats){
      totalCount=stats.length;
    }
  }catch(e){}

  // 오늘 주문 통계 저장 (중복 방지)
  if(orderId){
    try{
      const {data:exists}=await sb.from('pillar_planet_stats').select('id').eq('order_id',orderId).single();
      if(!exists){
        await sb.from('pillar_planet_stats').insert({
          day_pillar:pillar,
          dominant_planet:data.primary,
          dominant_planet_kor:data.primary_kor,
          order_id:orderId
        });
      }
    }catch(e){}
  }

  // UI 업데이트
  document.getElementById('planetIcon').textContent=PLANET_ICON[data.primary]||'🪐';
  document.getElementById('pillarText').textContent=pillar+'일주';
  document.getElementById('pctText').textContent=displayPct+'%';
  document.getElementById('pctText').style.color=PLANET_COLOR[data.primary]||'var(--gold)';
  document.getElementById('planetText').textContent=data.primary_kor+'('+data.primary+')';
  document.getElementById('subText').innerHTML=
    `같은 일주를 가진 사람 중 <strong style="color:${PLANET_COLOR[data.primary]}">${displayPct}%</strong>가<br>${data.primary_kor}이 도미넌트 행성으로 나옵니다.`;
  
  document.querySelector('.stats-title').textContent=`📊 ${pillar}일주 행성 분포 데이터`;

  // 통계 바 렌더
  const bars=[];
  bars.push({planet:data.primary_kor,pct:displayPct,color:PLANET_COLOR[data.primary]});
  if(data.secondary_kor) bars.push({planet:data.secondary_kor,pct:displayPct2,color:PLANET_COLOR[data.secondary]||'#aaa'});
  
  document.getElementById('statsBars').innerHTML=bars.map(b=>`
    <div class="stat-row">
      <div class="stat-planet">${b.planet}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${b.pct}%;background:${b.color}"></div></div>
      <div class="stat-pct">${b.pct}%</div>
      <div class="stat-count">${totalCount>0?Math.round(b.pct*totalCount/100)+'건':'-'}</div>
    </div>
  `).join('');

  const noteEl=document.getElementById('dataNote');
  if(isRealData) noteEl.textContent=`실제 분석 ${totalCount.toLocaleString()}건 기반 데이터`;
  else noteEl.textContent=`추정 데이터 기반${totalCount>0?' · 실제 '+totalCount+'건 누적 중':''} · 100건 이상 시 실제 통계로 전환`;
}

  } else {
    navigator.clipboard.writeText(`${pillar}일주는 ${data.primary_pct}% 확률로 ${data.primary_kor}이 도미넌트 행성으로 나옵니다 🪐\n\n내 행성도 확인해보세요!\n${shareUrl}`)
      .then(()=>showToast('링크가 복사됐어요! 카카오톡에 붙여넣기 하세요.'))
      .catch(()=>alert(`링크를 복사해서 카카오톡에 붙여넣기 하세요:\n${shareUrl}`));
  }
}

function showToast(msg){
  let t=document.getElementById('shareToast');
  if(!t){t=document.createElement('div');t.id='shareToast';t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;transition:opacity 0.3s;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',3000);
}

// 별 배경
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.style.cssText=`position:absolute;background:#fff;border-radius:50%;width:${Math.random()*2}px;height:${Math.random()*2}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${0.1+Math.random()*0.4}`;
  starsEl.appendChild(s);
}



init();
</script>
