<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포르투나 — 관리자</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--void:#05020e;--gold:#c9a84c;--gold-light:#e8cc7a;--text:#ede6f8;--text-dim:#9b8fb0;--border:rgba(201,168,76,0.2);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text);font-family:'Pretendard', sans-serif;min-height:100vh;}
  .nebula{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 30%,rgba(45,31,78,0.5) 0%,transparent 70%),radial-gradient(ellipse 80% 50% at 50% 50%,rgba(10,6,18,0.9) 0%,transparent 100%);}
  .login-wrap{position:relative;z-index:1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
  .login-box{background:linear-gradient(135deg,rgba(45,31,78,0.9),rgba(10,6,18,0.95));border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:360px;text-align:center;}
  .login-brand{font-size:12px;letter-spacing:0.4em;color:var(--gold);margin-bottom:8px;}
  .login-title{font-size:20px;font-weight:300;margin-bottom:32px;}
  .login-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:0.1em;}
  .login-input:focus{border-color:var(--gold);}
  .login-btn{width:100%;background:linear-gradient(135deg,#c9a84c,#e8cc7a);border:none;border-radius:10px;padding:14px;color:#0a0612;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
  .login-error{font-size:12px;color:rgba(255,100,100,0.8);margin-top:10px;display:none;}
  .dashboard{display:none;position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 20px 80px;}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .header-left .brand{font-size:12px;letter-spacing:0.4em;color:var(--gold);}
  .header-left .title{font-size:22px;font-weight:300;margin-top:4px;}
  .header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .nav-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:8px 16px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;transition:all 0.2s;}
  .nav-btn:hover{border-color:var(--gold);color:var(--gold);}
  .logout-btn{background:none;border:1px solid rgba(255,100,100,0.3);border-radius:20px;padding:8px 16px;color:rgba(255,100,100,0.6);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat{background:linear-gradient(135deg,rgba(45,31,78,0.4),rgba(10,6,18,0.6));border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .stat-num{font-size:26px;color:var(--gold);}
  .stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 20px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;position:relative;}
  .tab.active{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);}
  .tab .badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#0a0612;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:600;display:none;align-items:center;justify-content:center;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .filter-btn.active{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);}
  .search-input{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:6px 16px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:12px;outline:none;width:180px;}
  .search-input:focus{border-color:var(--gold);}
  .order-card{background:linear-gradient(135deg,rgba(45,31,78,0.3),rgba(10,6,18,0.5));border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;}
  .order-card.light{border-left:3px solid rgba(100,150,220,0.5);}
  .order-card.premium{border-left:3px solid var(--gold);}
  .order-card.saju_premium{border-left:3px solid rgba(180,100,255,0.7);}
  .order-card.saju{border-left:3px solid rgba(130,80,220,0.7);}
  .order-card.pet{border-left:3px solid rgba(244,162,97,0.6);}
  .order-card.done{opacity:0.6;}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .order-name{font-size:16px;}
  .order-type{font-size:10px;letter-spacing:0.15em;padding:3px 10px;border-radius:20px;margin-left:8px;}
  .type-light{background:rgba(100,150,220,0.15);color:#8ab4ff;border:1px solid rgba(100,150,220,0.3);}
  .type-premium{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--border);}
  .type-saju{background:rgba(180,100,255,0.15);color:#b482ff;border:1px solid rgba(180,100,255,0.3);}
  .type-dog{background:rgba(244,162,97,0.15);color:#f4a261;border:1px solid rgba(244,162,97,0.3);}
  .type-cat{background:rgba(180,130,255,0.15);color:#b482ff;border:1px solid rgba(180,130,255,0.3);}
  .order-id{font-size:11px;color:var(--text-dim);margin-top:3px;}
  .order-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
  .order-info span{color:var(--text);}
  .order-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .confirm-btn{flex:1;background:linear-gradient(135deg,#c9a84c,#e8cc7a);border:none;border-radius:8px;padding:10px;color:#0a0612;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .confirm-btn:disabled{opacity:0.4;cursor:not-allowed;background:#444;color:#888;}
  /* ✦ 강제 즉시 발송 버튼 스타일 */
  .force-send-btn{background:rgba(255,150,50,0.12);border:1px solid rgba(255,150,50,0.4);border-radius:8px;padding:10px 14px;color:#ffaa44;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .force-send-btn:hover{background:rgba(255,150,50,0.2);}
  .force-send-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .generate-btn{flex:1;background:rgba(138,180,255,0.12);border:1px solid rgba(138,180,255,0.3);border-radius:8px;padding:10px;color:#8ab4ff;font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
  .del-btn{background:none;border:1px solid rgba(255,100,100,0.3);border-radius:8px;padding:10px 16px;color:rgba(255,100,100,0.6);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;}
  .done-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:rgba(100,220,100,0.7);padding:6px 12px;border:1px solid rgba(100,220,100,0.2);border-radius:8px;}
  .saju-info-box{background:rgba(180,100,255,0.06);border:1px solid rgba(180,100,255,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.9;}
  .saju-info-box span{color:#b482ff;}
  /* ✦ 입금 대기 정보 박스 */
  .bank-pending-box{background:rgba(232,204,122,0.06);border:1px solid rgba(232,204,122,0.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.9;}
  .bank-pending-box span{color:#e8cc7a;}
  .report-preview{background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.1);border-radius:8px;padding:12px;margin-top:8px;font-size:12px;color:var(--text-dim);line-height:1.8;max-height:220px;overflow-y:auto;white-space:pre-wrap;display:none;}
  .rv-form-box{background:rgba(45,31,78,0.3);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;display:none;}
  .rv-form-box.show{display:block;}
  .add-rv-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:12px;padding:14px;color:var(--gold);font-family:'Pretendard',sans-serif;font-size:13px;cursor:pointer;margin-bottom:16px;}
  .form-field{margin-bottom:12px;}
  .form-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
  .form-input,.form-textarea,.form-select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none;-webkit-appearance:none;}
  .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--gold);}
  .form-select option{background:#1a1030;}
  .form-textarea{min-height:80px;resize:vertical;}
  .star-row{display:flex;gap:6px;margin-top:4px;}
  .star-btn{font-size:20px;cursor:pointer;color:rgba(201,168,76,0.2);background:none;border:none;padding:0;}
  .star-btn.on{color:var(--gold);}
  .form-btns{display:flex;gap:8px;margin-top:16px;}
  .btn-save{flex:1;background:linear-gradient(135deg,#c9a84c,#e8cc7a);border:none;border-radius:8px;padding:12px;color:#0a0612;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-cancel-form{background:none;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text-dim);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;}
  .rv-card{background:linear-gradient(135deg,rgba(45,31,78,0.3),rgba(10,6,18,0.5));border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;}
  .rv-header{display:flex;justify-content:space-between;margin-bottom:8px;}
  .rv-stars{color:var(--gold);font-size:14px;}
  .rv-badge{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--gold);margin-left:8px;}
  .rv-title{font-size:14px;font-weight:600;margin-bottom:6px;}
  .rv-content{font-size:13px;color:var(--text-dim);line-height:1.8;}
  .rv-date{font-size:11px;color:rgba(155,143,176,0.4);margin-top:8px;}
  .empty-msg{text-align:center;padding:40px;color:var(--text-dim);font-size:13px;line-height:2;}
  .loading-msg{text-align:center;padding:20px;color:var(--text-dim);font-size:13px;}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:50px;padding:12px 24px;color:var(--gold);font-size:13px;z-index:999;transition:transform 0.3s ease;backdrop-filter:blur(10px);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(10,6,18,0.3);border-top-color:#0a0612;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}.order-info{grid-template-columns:1fr;}.header{flex-direction:column;align-items:flex-start;gap:12px;}}
</style>
</head>
<body>
<div class="nebula"></div>
<div class="toast" id="toast"></div>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-brand">FORTUNA</div>
    <div class="login-title">관리자 로그인</div>
    <input type="password" class="login-input" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 틀렸습니다</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="brand">포르투나 · 관리자</div>
      <div class="title">주문 & 후기 관리</div>
    </div>
    <div class="header-right">
      <a href="/" class="nav-btn">메인</a>
      <a href="light.html" class="nav-btn">라이트</a>
      <a href="premium.html" class="nav-btn">프리미엄</a>
      <a href="saju-premium.html" class="nav-btn">사주+점성</a>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stTotal">-</div><div class="stat-label">전체 주문</div></div>
    <div class="stat"><div class="stat-num" id="stPending">-</div><div class="stat-label">입금 대기</div></div>
    <div class="stat"><div class="stat-num" id="stDone">-</div><div class="stat-label">발송 완료</div></div>
    <div class="stat"><div class="stat-num" id="stReviews">-</div><div class="stat-label">후기</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders')" id="tab-orders">
      주문 관리 <span class="badge" id="pendingBadge">0</span>
    </button>
    <button class="tab" onclick="switchTab('pets')" id="tab-pets">🐾 반려동물</button>
    <button class="tab" onclick="switchTab('reviews')" id="tab-reviews">후기 관리</button>
  </div>

  <div class="tab-content active" id="content-orders">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('light',this)">라이트</button>
      <button class="filter-btn" onclick="setFilter('premium',this)">프리미엄</button>
      <button class="filter-btn" onclick="setFilter('saju',this)">☯ 사주</button>
      <button class="filter-btn" onclick="setFilter('saju_premium',this)">☯ 사주+점성</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">입금대기</button>
      <button class="filter-btn" onclick="setFilter('confirmed',this)">발송완료</button>
      <input type="text" class="search-input" placeholder="이름 검색..." oninput="searchOrders(this.value)">
    </div>
    <div id="orderList"><div class="loading-msg">불러오는 중...</div></div>
  </div>

  <div class="tab-content" id="content-pets">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setPetFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setPetFilter('dog',this)">🐶 강아지</button>
      <button class="filter-btn" onclick="setPetFilter('cat',this)">🐱 고양이</button>
      <button class="filter-btn" onclick="setPetFilter('pending',this)">입금대기</button>
      <button class="filter-btn" onclick="setPetFilter('confirmed',this)">발송완료</button>
    </div>
    <div id="petOrderList"><div class="loading-msg">불러오는 중...</div></div>
  </div>

  <div class="tab-content" id="content-reviews">
    <button class="add-rv-btn" onclick="toggleRvForm()">+ 후기 직접 등록하기</button>
    <div class="rv-form-box" id="rvFormBox">
      <div class="form-field">
        <label class="form-label">별점 *</label>
        <div class="star-row">
          <button class="star-btn" onclick="setStar(1)">★</button>
          <button class="star-btn" onclick="setStar(2)">★</button>
          <button class="star-btn" onclick="setStar(3)">★</button>
          <button class="star-btn" onclick="setStar(4)">★</button>
          <button class="star-btn" onclick="setStar(5)">★</button>
        </div>
      </div>
      <div class="form-field"><label class="form-label">닉네임 *</label><input type="text" class="form-input" id="rvName" placeholder="예: 30대 직장인"></div>
      <div class="form-field"><label class="form-label">리포트 종류 *</label><select class="form-select" id="rvType"><option value="">선택</option><option value="light">라이트</option><option value="premium">프리미엄</option><option value="saju">사주</option><option value="saju_premium">사주+점성</option></select></div>
      <div class="form-field"><label class="form-label">한줄 제목 *</label><input type="text" class="form-input" id="rvTitle" placeholder="예: 읽으면서 소름이 돋았어요"></div>
      <div class="form-field"><label class="form-label">상세 내용 *</label><textarea class="form-textarea" id="rvContent" placeholder="후기 내용"></textarea></div>
      <div class="form-btns">
        <button class="btn-cancel-form" onclick="toggleRvForm()">취소</button>
        <button class="btn-save" onclick="saveReview()">등록하기</button>
      </div>
    </div>
    <div id="reviewList"><div class="loading-msg">불러오는 중...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY='sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const MAKE_LIGHT='https://hook.us2.make.com/b62293azhh6ivviyvbakvmoqulpw5756';
const MAKE_PREMIUM='https://hook.us2.make.com/eayso51sps46i7ig1dlyt3t1yw6q1tqu';
const MAKE_SAJU='https://hook.us2.make.com/27oszhlem54ghv1o5ilaps7cj2sr9302';

let currentFilter='all',searchTerm='',allOrders=[];
let petFilter='all',allPetOrders=[];

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

async function doLogin(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw)return;
  const {data}=await sb.from('admins').select('*').eq('password_hash',pw);
  if(data&&data.length>0){
    sessionStorage.setItem('admin','1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
function doLogout(){sessionStorage.removeItem('admin');location.reload();}

if(sessionStorage.getItem('admin')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
} else {
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dashboard').style.display='none';
}

async function loadAll(){await loadOrders();await loadStats();}

async function loadStats(){
  const {data:orders}=await sb.from('orders').select('status');
  const {data:pets}=await sb.from('pet_orders').select('status');
  const {data:reviews}=await sb.from('reviews').select('id');
  const allO=[...(orders||[]),...(pets||[])];
  const pending=allO.filter(o=>o.status==='pending'||o.status==='bank_transfer_pending').length;
  const done=allO.filter(o=>o.status==='confirmed').length;
  document.getElementById('stTotal').textContent=allO.length;
  document.getElementById('stPending').textContent=pending;
  document.getElementById('stDone').textContent=done;
  document.getElementById('stReviews').textContent=reviews?.length||0;
  if(pending>0){const b=document.getElementById('pendingBadge');b.style.display='flex';b.textContent=pending;}
}

async function loadOrders(){
  const {data}=await sb.from('orders').select('*').order('created_at',{ascending:false});
  allOrders=data||[];renderOrders();
}
async function loadPetOrders(){
  const {data}=await sb.from('pet_orders').select('*').order('id',{ascending:false});
  allPetOrders=data||[];renderPetOrders();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('content-'+tab).classList.add('active');
  if(tab==='reviews')loadReviews();
  if(tab==='pets')loadPetOrders();
}

function setFilter(f,el){currentFilter=f;document.querySelectorAll('#content-orders .filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderOrders();}
function searchOrders(v){searchTerm=v;renderOrders();}
function setPetFilter(f,el){petFilter=f;document.querySelectorAll('#content-pets .filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderPetOrders();}

function getTypeLabel(type){
  if(type==='premium')return '프리미엄';
  if(type==='saju')return '☯ 사주';
  if(type==='saju_premium')return '☯ 사주+점성';
  return '라이트';
}
function getTypeClass(type){
  if(type==='premium')return 'type-premium';
  if(type==='saju')return 'type-saju';
  if(type==='saju_premium')return 'type-saju';
  return 'type-light';
}

// ✦ 남은 대기 시간 계산
function getWaitInfo(confirmedAt){
  if(!confirmedAt)return null;
  const elapsed=(Date.now()-new Date(confirmedAt).getTime())/1000/60; // 분
  const remaining=30-elapsed;
  if(remaining<=0)return{ready:true,text:'자동발송 대기 중 (크론 처리 예정)'};
  return{ready:false,text:`자동발송까지 약 ${Math.ceil(remaining)}분 남음`};
}

function calcDominant(planets){
  const INNER=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const scores={};INNER.forEach(p=>{scores[p]=0;});
  const sun=planets.find(p=>p.name==='Sun');
  const moon=planets.find(p=>p.name==='Moon');
  const asc=planets.find(p=>p.name==='Ascendant');
  planets.forEach(p=>{if(!INNER.includes(p.name))return;if(p.house===1)scores[p.name]+=5;if(p.house===10)scores[p.name]+=4;});
  [sun,moon,asc].filter(Boolean).forEach(a=>{planets.forEach(p=>{if(!INNER.includes(p.name)||a.name===p.name)return;const diff=Math.abs(p.fullDegree-a.fullDegree);const angle=diff>180?360-diff:diff;if(angle<=8)scores[p.name]+=3;});});
  let dominant='Sun',maxScore=-999;INNER.forEach(p=>{if(scores[p]>maxScore){maxScore=scores[p];dominant=p;}});
  return dominant;
}
function calcAspects(planets){
  const ASPECTS=[{name:'합',angle:0,orb:8},{name:'대립',angle:180,orb:8},{name:'삼각',angle:120,orb:8},{name:'사각',angle:90,orb:6},{name:'육각',angle:60,orb:6}];
  const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const results=[];
  for(let i=0;i<PLANETS.length;i++){for(let j=i+1;j<PLANETS.length;j++){const p1=planets.find(p=>p.name===PLANETS[i]);const p2=planets.find(p=>p.name===PLANETS[j]);if(!p1||!p2)continue;const diff=Math.abs(p1.fullDegree-p2.fullDegree);const angle=diff>180?360-diff:diff;ASPECTS.forEach(asp=>{if(Math.abs(angle-asp.angle)<=asp.orb)results.push(PLANETS[i]+'-'+PLANETS[j]+' '+asp.name+'('+angle.toFixed(1)+'°)');});}}
  return results.join(', ');
}

// 기존 발송 버튼 (입금확인 + 발송)
async function confirmOrder(orderId, type){
  const btn=document.getElementById('btn-'+orderId);

}

// ✦ 강제 즉시 발송 (30분 대기 무시, 테스트용)
async function forceConfirmOrder(orderId, type){
  const o=allOrders.find(x=>x.order_id===orderId);
  if(!o)return;
  if(!confirm(`⚡ ${o.name}님 리포트를 지금 즉시 발송할까요?\n(30분 대기 무시)`))return;
  const btn=document.getElementById('force-'+orderId);
  await sendOrder(orderId, type, btn);
}

async function deleteOrder(orderId){
  if(!confirm('정말 삭제할까요?'))return;
  await sb.from('orders').delete().eq('order_id',orderId);
  await loadAll();showToast('삭제되었습니다');
}

  sendBtn.disabled=true;sendBtn.innerHTML='<span class="loading"></span>발송 중...';
  try{
    await fetch(MAKE_LIGHT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_id:o.order_id,client_name:o.owner_name,recipient_email:o.email,report_text:o.report_content,report_type:o.report_type,doc_name:'포르투나_'+o.pet_name+'_별자리사주리포트',pet_name:o.pet_name,pet_zodiac:o.pet_zodiac,status:'confirmed'})});
    await sb.from('pet_orders').update({status:'confirmed'}).eq('order_id',o.order_id);
    allPetOrders[idx].status='confirmed';sendBtn.textContent='✓ 발송 완료';
    showToast(o.pet_name+' 리포트 발송 완료! 🐾');await loadStats();
  }catch(e){sendBtn.disabled=false;sendBtn.textContent='📧 발송하기';showToast('발송 오류가 발생했습니다');}
}

async function deletePetOrder(orderId){
  if(!confirm('정말 삭제할까요?'))return;
  await sb.from('pet_orders').delete().eq('order_id',orderId);
  await loadPetOrders();showToast('삭제되었습니다');
}

let rvStar=0;
function toggleRvForm(){document.getElementById('rvFormBox').classList.toggle('show');}
function setStar(n){rvStar=n;document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('on',i<n));}

async function saveReview(){
  const name=document.getElementById('rvName').value.trim();
  const type=document.getElementById('rvType').value;
  const title=document.getElementById('rvTitle').value.trim();
  const content=document.getElementById('rvContent').value.trim();
  if(!rvStar||!name||!type||!title||!content){showToast('모든 항목을 입력해주세요');return;}
  await sb.from('reviews').insert([{name,type,title,content,star:rvStar,date:new Date().toLocaleDateString('ko-KR'),source:'admin',approved:true}]);
  rvStar=0;document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('on'));
  ['rvName','rvTitle','rvContent'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rvType').value='';
  document.getElementById('rvFormBox').classList.remove('show');
  await loadReviews();await loadStats();showToast('후기가 등록되었습니다!');
}

async function loadReviews(){
  const {data}=await sb.from('reviews').select('*').order('created_at',{ascending:false});
  const list=document.getElementById('reviewList');
  if(!data||!data.length){list.innerHTML='<div class="empty-msg">등록된 후기가 없습니다</div>';return;}
  list.innerHTML=data.map(r=>`
    <div class="rv-card" style="${r.approved?'':'border-color:rgba(255,200,0,0.3);'}">
      <div class="rv-header">
        <div><span style="font-size:15px;">${r.name}</span><span class="rv-badge">${getTypeLabel(r.type)}</span>${r.approved?'<span style="font-size:10px;color:#88cc88;margin-left:8px;">✅ 승인됨</span>':'<span style="font-size:10px;color:#e8cc7a;margin-left:8px;">⏳ 승인대기</span>'}</div>
        <div class="rv-stars">${'★'.repeat(r.star)}${'☆'.repeat(5-r.star)}</div>
      </div>
      <div class="rv-title">${r.title}</div>
      <div class="rv-content">${r.content}</div>
      <div class="rv-date">${r.date} · ${r.source==='admin'?'관리자 등록':'고객 작성'}</div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        ${!r.approved?'<button onclick="approveReview('+r.id+')" style="background:rgba(100,200,100,0.1);border:1px solid rgba(100,200,100,0.3);border-radius:6px;padding:5px 12px;color:#88cc88;font-family:Pretendard,sans-serif;font-size:11px;cursor:pointer;">✅ 승인</button>':''}
        ${r.approved?'<button onclick="unapproveReview('+r.id+')" style="background:none;border:1px solid rgba(255,200,0,0.3);border-radius:6px;padding:5px 12px;color:#e8cc7a;font-family:Pretendard,sans-serif;font-size:11px;cursor:pointer;">승인 취소</button>':''}
        <button onclick="deleteReview('+r.id+')" style="background:none;border:1px solid rgba(255,100,100,0.3);border-radius:6px;padding:5px 12px;color:rgba(255,100,100,0.6);font-family:Pretendard,sans-serif;font-size:11px;cursor:pointer;">삭제</button>
      </div>
    </div>`).join('');
}

async function approveReview(id){await sb.from('reviews').update({approved:true}).eq('id',id);await loadReviews();showToast('후기가 승인되었습니다 ✅');}
async function unapproveReview(id){await sb.from('reviews').update({approved:false}).eq('id',id);await loadReviews();showToast('승인이 취소되었습니다');}
async function deleteReview(id){await sb.from('reviews').delete().eq('id',id);await loadReviews();await loadStats();showToast('후기가 삭제되었습니다');}

if(sessionStorage.getItem('admin')==='1')loadAll();
</script>
