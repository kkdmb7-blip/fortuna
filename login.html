<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포르투나 — 관리자 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0a0a0f;
    --gold:#d4af37;
    --gold-light: #e8cc7a;
    --text: #ede6f8;
    --text-dim: #8b8ba8;
    --border: rgba(212,175,55,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR',sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(30px,20px)} }
  @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-20px,30px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* 로그인 박스 */
  .wrap { position:relative; z-index:1; width:100%; max-width:400px; padding:24px; }

  .login-box {
    background: linear-gradient(145deg, rgba(25,12,55,0.95), rgba(8,4,20,0.98));
    border: 1px solid var(--border);
    border-radius:16px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.05);
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .symbol {
    text-align: center;
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }
  .symbol-icon {
    font-size: 36px;
    display: block;
  }

  .brand {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .title {
    text-align: center;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 32px;
  }

  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Noto Sans KR',sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .field-input:focus {
    border-color: var(--gold);
    background: rgba(212,175,55,0.04);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
  }
  .field-input::placeholder { color: rgba(155,143,176,0.4); letter-spacing: 0.05em; }

  .login-btn {
    width: 100%;
    background:linear-gradient(135deg,#7b5ea7,#a07fd4);
    border: none;
    border-radius: 12px;
    padding: 15px;
    color: #0a0a0f;
    font-family: 'Noto Sans KR',sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,175,55,0.35); }
  .login-btn:active { transform: translateY(0); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .loading { display:inline-block; width:14px; height:14px; border:2px solid rgba(10,10,15,0.3); border-top-color:#0a0a0f; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:6px; }

  .error-msg {
    text-align: center;
    font-size: 12px;
    color: rgba(255,120,120,0.8);
    margin-top: 14px;
    padding: 10px;
    background: rgba(255,80,80,0.06);
    border: 1px solid rgba(255,80,80,0.15);
    border-radius: 8px;
    display: none;
  }

  .footer-link {
    display: block;
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .footer-link:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="wrap">
  <div class="login-box">
    <div class="symbol"><span class="symbol-icon">✦</span></div>
    <div class="brand">FORTUNA</div>
    <div class="title">관리자</div>
    <p class="subtitle">Admin Dashboard</p>
    <div class="divider"></div>

    <div class="field">
      <label class="field-label">비밀번호</label>
      <input
        type="password"
        class="field-input"
        id="pwInput"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()"
        autofocus
      >
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      로그인
    </button>

    <div class="error-msg" id="errorMsg">
      비밀번호가 올바르지 않습니다
    </div>

    <a href="/" class="footer-link">← 메인으로 돌아가기</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://afktkixkbcirsknahbmx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 이미 로그인 상태면 바로 이동
if(sessionStorage.getItem('admin') === '1') {
  location.href = 'admin.html';
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if(!pw) return;

  const btn = document.getElementById('loginBtn');
  const errMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>확인 중...';
  errMsg.style.display = 'none';

  try {
    const { data } = await sb.from('admins').select('*').eq('password_hash', pw);
    if(data && data.length > 0) {
      sessionStorage.setItem('admin', '1');
      btn.innerHTML = '✦ 로그인 성공';
      setTimeout(() => { location.href = 'admin.html'; }, 600);
    } else {
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '로그인';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  } catch(e) {
    console.error(e);
    errMsg.textContent = '오류가 발생했습니다. 다시 시도해주세요';
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}
</script>
</body>
</html>
