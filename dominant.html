<style>
  :root{
    --void:#05020e;
    --gold:#c9a84c;
    --gold-light:#e8cc7a;
    --text:#ede6f8;
    --text-dim:#9b8fb0;
    --border:rgba(201,168,76,0.2);
    --card:linear-gradient(135deg,rgba(45,31,78,0.4),rgba(10,6,18,0.6));

  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text);font-family:'Pretendard',sans-serif;min-height:100vh;}
  .nebula{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%,rgba(45,31,78,0.5) 0%,transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 50%,rgba(10,6,18,0.9) 0%,transparent 100%);
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:16px 32px;display:flex;justify-content:space-between;align-items:center;
    backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.08);
    background:rgba(5,2,14,0.35);
  }
  .nav-brand{font-size:16px;letter-spacing:0.2em;color:var(--gold);text-decoration:none;}
  .nav-back{font-size:12px;color:var(--text-dim);text-decoration:none;transition:color 0.2s;}
  .nav-back:hover{color:var(--gold);}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:120px 24px 80px;}
  .header{text-align:center;margin-bottom:48px;}
  .eyebrow{font-size:11px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;}
  .title{font-size:32px;font-weight:300;line-height:1.4;margin-bottom:12px;}
  .subtitle{font-size:14px;color:var(--text-dim);line-height:1.8;}
  .card{
    background:var(--card);
    border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
  }
  .field{margin-bottom:18px;}
  .label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:8px;letter-spacing:0.05em;}
  .input{
    width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);
    border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Pretendard',sans-serif;
    font-size:15px;outline:none;transition:border-color 0.3s;-webkit-appearance:none;
  }
  .input:focus{border-color:var(--gold);}
  select.input option{background:#1a1030;}
  .helper{
    margin-top:10px;font-size:12px;color:rgba(155,143,176,0.75);line-height:1.7;
  }
  .btn{
    width:100%;background:linear-gradient(135deg,#c9a84c,#e8cc7a,#c9a84c);background-size:200% 200%;
    border:none;border-radius:12px;padding:16px;color:#0a0612;font-family:'Pretendard',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;animation:shimmer 3s ease infinite;margin-top:8px;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,0.4);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-sub{
    width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);
    border-radius:12px;padding:14px;color:var(--text);font-family:'Pretendard',sans-serif;
    font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;text-decoration:none;
  }
  .btn-sub:hover{border-color:var(--gold);color:var(--gold);}
  @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{
    display:inline-block;width:14px;height:14px;border:2px solid rgba(10,6,18,0.3);
    border-top-color:#0a0612;border-radius:50%;animation:spin 0.8s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  .result{
    background:linear-gradient(135deg,rgba(45,31,78,0.5),rgba(10,6,18,0.7));
    border:1px solid var(--gold);border-radius:20px;padding:40px 32px;margin-top:24px;text-align:center;

    box-shadow:0 14px 50px rgba(0,0,0,0.22);
  }
  .result-topline{
    font-size:11px;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;
  }
  .result-emoji{font-size:60px;margin-bottom:12px;}
  .result-name{font-size:24px;font-weight:300;color:var(--gold);letter-spacing:0.1em;margin-bottom:18px;}
  .result-hook{

  }
  .result-desc{

  .share-box{

  }
  .share-title{
    font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.8;
  }
  .share-actions{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
  }
  .share-btn{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(201,168,76,0.18);
    color:var(--text);
    border-radius:12px;
    padding:13px 10px;

    font-size:13px;
    font-weight:600;

  .share-btn:hover{

  }
  .upsell{

  }
  .upsell-text{

  }
  .upsell-btn{

function showToast(msg){

}

function parseBirthdate(str){
  const clean=str.replace(/[^0-9]/g,'');
  if(clean.length===8){
    const y=parseInt(clean.slice(0,4)),m=parseInt(clean.slice(4,6)),d=parseInt(clean.slice(6,8));
    if(y<1900||y>2026||m<1||m>12||d<1||d>31) return null;
    return {year:y,month:m,day:d};
  }
  const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);
  if(p.length<3) return null;
  const y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  if(y<1900||y>2026||m<1||m>12||d<1||d>31) return null;
  return {year:y,month:m,day:d};
}

function parseTime(str){
  if(!str||!str.trim()) return {hour:12,min:0};
  const clean=str.replace(/[^0-9]/g,'');
  let h,m;
  if(clean.length===3){h=parseInt(clean.slice(0,1));m=parseInt(clean.slice(1));}
  else if(clean.length===4){h=parseInt(clean.slice(0,2));m=parseInt(clean.slice(2));}
  else{
    const p=str.replace(/[^0-9]/g,' ').trim().split(/\s+/);
    h=parseInt(p[0])||12;
    m=parseInt(p[1])||0;
  }
  if(h<0||h>23||m<0||m>59) return {hour:12,min:0};
  return {hour:h,min:m};
}

function calcDominantPlanet(planets){
  const PLANETS=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
  const SIGN_NAMES=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const SIGN_RULERS={
    'Aries':'Mars','Taurus':'Venus','Gemini':'Mercury','Cancer':'Moon',
    'Leo':'Sun','Virgo':'Mercury','Libra':'Venus','Scorpio':'Pluto',
    'Sagittarius':'Jupiter','Capricorn':'Saturn','Aquarius':'Uranus','Pisces':'Neptune'
  };
  const BASE_WEIGHT={Sun:2.0,Moon:2.0,Mercury:1.5,Venus:1.5,Mars:2.0,Jupiter:1.0,Saturn:0.8,Uranus:0.5,Neptune:0.5,Pluto:0.5};
  const HOUSE_SCORES={1:6,10:5,7:4,4:5,2:2,5:2,8:2,11:2,3:1,6:1,9:1,12:1};

  const scores={};
  PLANETS.forEach(p=>{scores[p]=0;});

  planets.forEach(p=>{
    if(!PLANETS.includes(p.name)) return;
    const hs=HOUSE_SCORES[p.house]||0;
    const w=BASE_WEIGHT[p.name]||1;
    scores[p.name]+=hs*w;
    if(p.isRetro==='true') scores[p.name]-=1;
  });

  planets.forEach(p=>{
    if(!PLANETS.includes(p.name)) return;
    const signIdx=Math.floor(p.fullDegree/30);
    const sign=SIGN_NAMES[signIdx];
    if(SIGN_RULERS[sign]===p.name){
      const w=BASE_WEIGHT[p.name]||1;
      scores[p.name]+=6*w;
    }
  });

  planets.forEach(p=>{
    if(!PLANETS.includes(p.name)) return;
    const ruledSigns=Object.entries(SIGN_RULERS).filter(([s,r])=>r===p.name).map(([s])=>s);
    planets.forEach(other=>{
      if(!PLANETS.includes(other.name)) return;
      const otherSign=SIGN_NAMES[Math.floor(other.fullDegree/30)];
      if(ruledSigns.includes(otherSign)){
        const w=BASE_WEIGHT[other.name]||1;
        scores[p.name]+=2*w;
      }
    });
  });

  const asc=planets.find(p=>p.name==='Ascendant');
  if(asc){
    const ascSign=SIGN_NAMES[Math.floor(asc.fullDegree/30)];
    const ascRuler=SIGN_RULERS[ascSign];
    if(ascRuler&&scores[ascRuler]!==undefined) scores[ascRuler]+=3;
  }

  const keyPoints=planets.filter(p=>['Sun','Moon','Ascendant'].includes(p.name));
  keyPoints.forEach(key=>{
    planets.forEach(p=>{
      if(!PLANETS.includes(p.name)||key.name===p.name) return;
      const diff=Math.abs(p.fullDegree-key.fullDegree);
      const angle=diff>180?360-diff:diff;
      const ASPECTS=[
        {a:0,orb:8,w:3},
        {a:120,orb:8,w:2.5},
        {a:60,orb:6,w:2},
        {a:180,orb:8,w:2},
        {a:90,orb:6,w:1.5}
      ];
      for(const asp of ASPECTS){
        if(Math.abs(angle-asp.a)<=asp.orb){
          scores[p.name]+=asp.w*(BASE_WEIGHT[p.name]||1);
          break;
        }
      }
    });
  });

  let dominant='Sun', max=-999;
  PLANETS.forEach(p=>{
    if(scores[p]>max){
      max=scores[p];
      dominant=p;
    }
  });
  return dominant;
}

function buildShareText(resultName){
  return `나의 핵심 행성을 확인했는데 ${resultName}이(가) 나왔어요.\n생각보다 꽤 잘 맞아서 신기했어요 ✦\n\nFORTUNA에서 무료로 확인해보기`;
}

function getShareUrl(){
  return `${window.location.origin}${window.location.pathname}?utm_source=share&utm_medium=dominant&utm_campaign=free_test`;
}

async function shareResult(){
  if(!currentResult){
    showToast('먼저 결과를 확인해주세요');
    return;
  }

  const shareText = buildShareText(currentResult.name);
  const shareUrl = getShareUrl();

  if(navigator.share){
    try{
      await navigator.share({
        title:`FORTUNA - 나의 핵심 행성은 ${currentResult.name}`,
        text:shareText,
        url:shareUrl
      });
      return;
    }catch(e){
      // 사용자가 취소한 경우 조용히 종료
      if(e && e.name === 'AbortError') return;
    }
  }

  try{
    await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
    showToast('공유 문구와 링크가 복사되었어요');
  }catch(e){
    showToast('공유에 실패했어요');
  }
}

async function copyResultLink(){
  try{
    await navigator.clipboard.writeText(getShareUrl());
    showToast('링크가 복사되었어요');
  }catch(e){
    showToast('링크 복사에 실패했어요');
  }
}

async function calcDominant(){
  const birth=document.getElementById('calcBirth').value.trim();
  const place=document.getElementById('calcPlace').value;

  if(!birth||!place){
    showToast('생년월일과 지역을 선택해주세요');
    return;
  }

  const bd=parseBirthdate(birth);
  if(!bd){
    showToast('생년월일 형식을 확인해주세요 (예: 1990.03.15)');
    return;
  }

  const city=CITIES[place];
  if(!city){
    showToast('지역을 선택해주세요');
    return;
  }

  const bt=parseTime(document.getElementById('calcTime').value);
  const btn=document.getElementById('calcBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="loading"></span>계산 중...';

  try{
    const res=await fetch('https://json.astrologyapi.com/v1/planets/tropical',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Basic '+btoa('650365:2f0f8ed601443fd86eb24b9e503b4cabd3aec6b8')
      },
      body:JSON.stringify({
        day:bd.day,
        month:bd.month,
        year:bd.year,
        hour:bt.hour,
        min:bt.min,
        lat:city.lat,
        lon:city.lon,
        tzone:9.0
      })
    });

    const data=await res.json();
    const planets=data.output||data;
    const dominant=calcDominantPlanet(planets);
    const info=PLANET_INFO[dominant]||{emoji:'✦',name:dominant,hook:'당신에게 강하게 작용하는 행성입니다.',desc:''};

    currentResult = {
      key: dominant,
      name: info.name,
      hook: info.hook,
      desc: info.desc
    };

    document.getElementById('resultEmoji').textContent=info.emoji;
    document.getElementById('resultName').textContent=info.name;
    document.getElementById('resultHook').textContent=info.hook;
    document.getElementById('resultDesc').textContent=info.desc;
    document.getElementById('result').style.display='block';
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){
    showToast('오류가 발생했어요. 다시 시도해주세요');
    console.error(e);
  }

  btn.disabled=false;
  btn.textContent='✦ 내 핵심 행성 확인하기';
}
